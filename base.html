                    cy - player.dashVelocityY * 1.5,
                    angle, false, (player.dashTimer / player.dashFrames) * 0.5
                );
            }

            if (player.meleeEffectTimer > 0) {
                const arcSize = Math.PI * 0.85;
                const meleeAngle = Math.atan2(player.meleeDirY, player.meleeDirX);
                ctx.strokeStyle = '#ffeeaa';
                ctx.lineWidth = 4;
                ctx.globalAlpha = player.meleeEffectTimer / 8;
                ctx.beginPath();
                ctx.arc(cx, cy, player.meleeRange * 0.65, meleeAngle - arcSize / 2, meleeAngle + arcSize / 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            drawMouseCharacter(cx, cy, angle, hitFlash, 1);

            if (player.hitTimer > 0) {
                // already handled via hitFlash in drawMouseCharacter
            }

            // Draw reload bar above player if reloading
            if (player.isReloading) {
                const barWidth = 40;
                const barHeight = 5;
                const barX = player.x - camera.x + player.width / 2 - barWidth / 2;
                const barY = player.y - camera.y - 15;

                // Background bar
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barWidth, barHeight);

                // Filled bar (green to red gradient)
                const reloadProgress = 1 - (player.reloadTime / player.maxReloadTime);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(barX, barY, barWidth * reloadProgress, barHeight);

                // Border
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(barX, barY, barWidth, barHeight);
            }
        }

        // Draw bullets
        function drawBullets() {
            for (let bullet of bullets) {
                drawBulletTrail(bullet);
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(
                    bullet.x - camera.x,
                    bullet.y - camera.y,
                    bullet.size,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }
        }

        // Draw enemy bullets
        function drawEnemyBullets() {
            for (let bullet of enemyBullets) {
                drawBulletTrail(bullet);
                ctx.fillStyle = bullet.color;
                ctx.beginPath();
                ctx.arc(
                    bullet.x - camera.x,
                    bullet.y - camera.y,
                    bullet.size,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
            }
        }

        // Draw particles
        function drawParticles() {
            for (let particle of particles) {
                ctx.fillStyle = particle.color;
                ctx.globalAlpha = particle.life / particle.maxLife;
                ctx.beginPath();
                ctx.arc(
                    particle.x - camera.x,
                    particle.y - camera.y,
                    particle.size,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                ctx.globalAlpha = 1;
            }
        }

        // Draw enemies
        function drawEnemies() {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            for (let enemy of enemies) {
                const enemyCenterX = enemy.x + enemy.width / 2;
                const enemyCenterY = enemy.y + enemy.height / 2;
                // Only check line of sight, no radius limit
                if (!hasLineOfSight(playerCenterX, playerCenterY, enemyCenterX, enemyCenterY)) {
                    continue;
                }
                ctx.fillStyle = enemy.color;
                ctx.fillRect(
                    enemy.x - camera.x,
                    enemy.y - camera.y,
                    enemy.width,
                    enemy.height
                );

                const label = enemy.variant === 'special' ? 'SPECIAL' : (enemy.variant === 'melee' ? 'MELEE' : (enemy.weaponId ? enemy.weaponId.toUpperCase() : 'RANGED'));
                ctx.fillStyle = '#ffffff';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText(label, enemyCenterX - camera.x, enemy.y - camera.y - 4);

                if (enemy.hitTimer > 0) {
                    ctx.globalAlpha = enemy.hitTimer / 10;
                    ctx.fillStyle = '#ffffff';
                    ctx.fillRect(
                        enemy.x - camera.x,
                        enemy.y - camera.y,
                        enemy.width,
                        enemy.height
                    );
                    ctx.globalAlpha = 1;
                }
            }
        }

        // Draw coins
        function drawCoins() {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            for (let coin of coins) {
                // Only check line of sight, no radius limit
                if (!hasLineOfSight(playerCenterX, playerCenterY, coin.x, coin.y)) {
                    continue;
                }
                ctx.fillStyle = coin.color;
                ctx.beginPath();
                ctx.arc(
                    coin.x - camera.x,
                    coin.y - camera.y,
                    coin.size,
                    0,
                    Math.PI * 2
                );
                ctx.fill();
                
                // Outline
                ctx.strokeStyle = '#cc9900';
                ctx.lineWidth = 1;
                ctx.stroke();
            }
        }

        function drawBaseElements() {
            // Row labels
            if (weaponStations.length > 0) {
                const mainRow = weaponStations.find(s => s.row === 'main');
                const sideRow = weaponStations.find(s => s.row === 'sidearm');
                ctx.fillStyle = '#c8a060';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                if (mainRow) ctx.fillText('MAIN WEAPONS', mainRow.x - camera.x, mainRow.y - camera.y - 2);
                if (sideRow) ctx.fillText('SIDEARMS', sideRow.x - camera.x, sideRow.y - camera.y - 2);
            }

            for (let station of weaponStations) {
                const unlocked = isWeaponUnlocked(station.id);
                const isSelected = unlocked && (
                    (station.row === 'main' && station.id === selectedWeaponId) ||
                    (station.row === 'sidearm' && station.id === sidearmId)
                );
                ctx.fillStyle = unlocked ? (isSelected ? '#4a3a10' : '#2a2a2a') : '#2a2222';
                ctx.fillRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.strokeStyle = unlocked ? (isSelected ? '#e8c060' : '#777777') : '#aa6666';
                ctx.lineWidth = isSelected ? 2.5 : 1.5;
                ctx.strokeRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.fillStyle = unlocked ? (isSelected ? '#ffe080' : '#dddddd') : '#ff9999';
                ctx.font = isSelected ? 'bold 12px Arial' : '12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(
                    unlocked ? weaponConfigs[station.id].name : 'LOCKED',
                    station.x - camera.x + station.width / 2,
                    station.y - camera.y + station.height / 2
                );
                if (!unlocked) {
                    ctx.fillStyle = '#aa8844';
                    ctx.font = '9px Arial';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText(`$${weaponUnlockCosts[station.id]}`, station.x - camera.x + station.width / 2, station.y - camera.y + station.height - 2);
                }
            }

            // Grenade section label
            if (grenadeStations.length > 0) {
                const first = grenadeStations[0];
                ctx.fillStyle = '#c8a060';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText('SUPPLIES ($30 each)', first.x - camera.x, first.y - camera.y - 2);
            }

            for (let station of grenadeStations) {
                const gType = grenadeTypes[station.type] || {};
                const isEquipped = equippedGrenadeType === station.type && grenadeCount > 0;
                ctx.fillStyle = isEquipped ? 'rgba(60,40,10,0.9)' : 'rgba(30,25,20,0.8)';
                ctx.fillRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.strokeStyle = isEquipped ? (gType.color || '#ffffff') : '#554433';
                ctx.lineWidth = isEquipped ? 2.5 : 1.5;
                ctx.strokeRect(station.x - camera.x, station.y - camera.y, station.width, station.height);

                // Color circle
                ctx.fillStyle = gType.color || '#888888';
                ctx.beginPath();
                ctx.arc(station.x - camera.x + 18, station.y - camera.y + 22, 10, 0, Math.PI * 2);
                ctx.fill();

                ctx.fillStyle = '#dddddd';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(gType.name || station.type, station.x - camera.x + 32, station.y - camera.y + 6);

                ctx.fillStyle = '#aa8844';
                ctx.font = '10px Arial';
                ctx.fillText(`$${grenadeBaseCost}`, station.x - camera.x + 32, station.y - camera.y + 22);

                if (isEquipped) {
                    ctx.fillStyle = '#ffe080';
                    ctx.font = 'bold 11px Arial';
                    ctx.textBaseline = 'bottom';
                    ctx.textAlign = 'center';
                    ctx.fillText(`x${grenadeCount}`, station.x - camera.x + station.width / 2, station.y - camera.y + station.height - 4);
                }
            }
            
            // Upgrade stations removed — handled by passive skills

            // ARMORY — weapon mod stations
            if (modStations.length > 0) {
                ctx.fillStyle = '#c8a060';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText('ARMORY', modStations[0].x - camera.x, modStations[0].y - camera.y - 2);
            }
            for (let station of modStations) {
                const def = weaponModDefs[station.id];
                const onMain = equippedMods.main.includes(station.id);
                const onSide = equippedMods.sidearm.includes(station.id);
                const isEquipped = onMain || onSide;
                ctx.fillStyle = isEquipped ? 'rgba(40,30,10,0.9)' : 'rgba(25,22,18,0.8)';
                ctx.fillRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.strokeStyle = isEquipped ? '#e8c060' : '#554433';
                ctx.lineWidth = isEquipped ? 2 : 1;
                ctx.strokeRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.fillStyle = isEquipped ? '#ffe080' : '#dddddd';
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(def.name, station.x - camera.x + 5, station.y - camera.y + 4);
                ctx.fillStyle = '#999999';
                ctx.font = '8px Arial';
                ctx.textBaseline = 'bottom';
                ctx.fillText(def.desc, station.x - camera.x + 5, station.y - camera.y + station.height - 3);
                ctx.textAlign = 'right';
                if (isEquipped) {
                    ctx.fillStyle = onMain ? '#ffe080' : '#88ccff';
                    ctx.font = 'bold 8px Arial';
                    ctx.textBaseline = 'top';
                    ctx.fillText(onMain ? 'MAIN' : 'SIDE', station.x - camera.x + station.width - 4, station.y - camera.y + 4);
                } else {
                    ctx.fillStyle = '#aa8844';
                    ctx.font = '8px Arial';
                    ctx.textBaseline = 'top';
                    ctx.fillText('$' + def.cost, station.x - camera.x + station.width - 4, station.y - camera.y + 4);
                }
            }

            // SKILLS — passive + active skill stations
            const firstPassive = skillStations.find(s => s.type === 'passive');
            const firstActive  = skillStations.find(s => s.type === 'active');
            ctx.font = 'bold 11px Arial';
            ctx.textBaseline = 'bottom';
            if (firstPassive) {
                ctx.fillStyle = '#88ffaa';
                ctx.textAlign = 'center';
                ctx.fillText('PASSIVE', firstPassive.x - camera.x + firstPassive.width / 2, firstPassive.y - camera.y - 2);
            }
            if (firstActive) {
                ctx.fillStyle = '#ffaa88';
                ctx.textAlign = 'center';
                ctx.fillText('ACTIVE', firstActive.x - camera.x + firstActive.width / 2, firstActive.y - camera.y - 2);
            }
            for (let station of skillStations) {
                const def = station.type === 'passive' ? passiveSkillDefs[station.id] : activeSkillDefs[station.id];
                const isLearned = station.type === 'passive'
                    ? learnedSkills.passive.includes(station.id)
                    : learnedSkills.active.includes(station.id);
                ctx.fillStyle = isLearned ? 'rgba(10,40,20,0.9)' : 'rgba(22,20,28,0.85)';
                ctx.fillRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.strokeStyle = isLearned ? '#44cc88' : (station.type === 'passive' ? '#447744' : '#774444');
                ctx.lineWidth = isLearned ? 2 : 1;
                ctx.strokeRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.fillStyle = isLearned ? '#88ffcc' : '#dddddd';
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(def.name, station.x - camera.x + station.width / 2, station.y - camera.y + 5);
                ctx.fillStyle = '#999999';
                ctx.font = '8px Arial';
                ctx.textBaseline = 'middle';
                ctx.fillText(def.desc, station.x - camera.x + station.width / 2, station.y - camera.y + station.height / 2 + 3);
                ctx.textBaseline = 'bottom';
                if (isLearned) {
                    ctx.fillStyle = '#44cc88';
                    ctx.font = 'bold 8px Arial';
                    ctx.fillText('LEARNED', station.x - camera.x + station.width / 2, station.y - camera.y + station.height - 3);
                } else {
                    ctx.fillStyle = '#aa8844';
                    ctx.font = '8px Arial';
                    ctx.fillText('$' + def.cost, station.x - camera.x + station.width / 2, station.y - camera.y + station.height - 3);
                }
            }

            // LEVEL SELECT — stations near the door
            if (levelStations.length > 0) {
                const midX = levelStations[0].x - camera.x + (levelStations[levelStations.length - 1].x + levelStations[levelStations.length - 1].width - levelStations[0].x) / 2;
                ctx.fillStyle = '#c8a060';
                ctx.font = 'bold 12px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('SELECT LEVEL', midX, levelStations[0].y - camera.y - 4);
            }
            for (let station of levelStations) {
                const isSelected = currentLevel === station.id;
                const isLocked = !station.unlocked;
                ctx.fillStyle = isLocked ? 'rgba(20,18,18,0.85)' : (isSelected ? 'rgba(50,35,10,0.95)' : 'rgba(28,24,20,0.85)');
                ctx.fillRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.strokeStyle = isLocked ? '#3a3030' : (isSelected ? station.color : '#555544');
                ctx.lineWidth = isSelected ? 3 : 1.5;
                ctx.strokeRect(station.x - camera.x, station.y - camera.y, station.width, station.height);
                ctx.fillStyle = isLocked ? '#555555' : (isSelected ? station.color : '#cccccc');
                ctx.font = 'bold 10px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText(station.name, station.x - camera.x + station.width / 2, station.y - camera.y + 7);
                ctx.fillStyle = isLocked ? '#444444' : '#999999';
                ctx.font = '9px Arial';
                ctx.textBaseline = 'middle';
                ctx.fillText(isLocked ? 'Extract to unlock' : station.desc, station.x - camera.x + station.width / 2, station.y - camera.y + station.height / 2 + 4);
                if (isSelected) {
                    ctx.fillStyle = station.color;
                    ctx.font = 'bold 8px Arial';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('SELECTED', station.x - camera.x + station.width / 2, station.y - camera.y + station.height - 4);
                } else if (isLocked) {
                    ctx.fillStyle = '#553333';
                    ctx.font = 'bold 8px Arial';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('LOCKED', station.x - camera.x + station.width / 2, station.y - camera.y + station.height - 4);
                }
            }

            // WARDROBE — skin cosmetics (bottom-left)
            if (wardrobeStations.length > 0) {
                ctx.fillStyle = '#c890cc';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'bottom';
                ctx.fillText('WARDROBE', wardrobeStations[0].x - camera.x, wardrobeStations[0].y - camera.y - 4);
            }
            for (let station of wardrobeStations) {
                const def = skinDefs[station.id];
                const isEquipped = equippedSkinId === station.id;
                const isOwned = unlockedSkins.includes(station.id);
                const sx = station.x - camera.x;
                const sy = station.y - camera.y;

                // Card background — use skin body color as subtle tint
                ctx.fillStyle = isEquipped ? 'rgba(60,30,70,0.95)' : (isOwned ? 'rgba(35,22,40,0.88)' : 'rgba(22,16,28,0.85)');
                ctx.fillRect(sx, sy, station.width, station.height);
                ctx.strokeStyle = isEquipped ? '#cc88ff' : (isOwned ? '#8855aa' : '#443344');
                ctx.lineWidth = isEquipped ? 2.5 : 1.5;
                ctx.strokeRect(sx, sy, station.width, station.height);

                // Mini mouse preview circle (colored with skin)
                ctx.fillStyle = def.body;
                ctx.beginPath(); ctx.arc(sx + 14, sy + station.height / 2, 7, 0, Math.PI * 2); ctx.fill();
                ctx.strokeStyle = def.bodyStroke; ctx.lineWidth = 1; ctx.stroke();
                // Ear
                ctx.fillStyle = def.ear;
                ctx.beginPath(); ctx.arc(sx + 10, sy + station.height / 2 - 8, 3.5, 0, Math.PI * 2); ctx.fill();

                // Skin name
                ctx.fillStyle = isEquipped ? '#cc88ff' : (isOwned ? '#ddbbee' : '#aaaaaa');
                ctx.font = 'bold 9px Arial';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'top';
                ctx.fillText(def.name, sx + 26, sy + 6);

                // Cost or status
                ctx.font = '8px Arial';
                ctx.textBaseline = 'bottom';
                if (isEquipped) {
                    ctx.fillStyle = '#cc88ff';
                    ctx.fillText('WEARING', sx + 26, sy + station.height - 4);
                } else if (isOwned) {
                    ctx.fillStyle = '#99aacc';
                    ctx.fillText('OWNED', sx + 26, sy + station.height - 4);
                } else {
                    ctx.fillStyle = '#ffee88';
                    ctx.fillText(`${def.cost} crumbs`, sx + 26, sy + station.height - 4);
                }
            }

            if (!baseDoorOpen) {
                ctx.fillStyle = '#663300';
                ctx.fillRect(
                    baseDoorObstacle.x - camera.x,
                    baseDoorObstacle.y - camera.y,
                    baseDoorObstacle.width,
                    baseDoorObstacle.height
                );
            } else {
                ctx.strokeStyle = '#886633';
                ctx.lineWidth = 3;
                ctx.strokeRect(
                    baseDoorObstacle.x - camera.x,
                    baseDoorObstacle.y - camera.y,
                    baseDoorObstacle.width,
                    baseDoorObstacle.height
                );
            }
        }

        function drawBasePrompts() {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const station = getNearbyWeaponStation(playerCenterX, playerCenterY);
            const gStation = getNearbyGrenadeStation(playerCenterX, playerCenterY);
            const modStation = getNearbyModStation(playerCenterX, playerCenterY);
            const skillStation = getNearbySkillStation(playerCenterX, playerCenterY);
            const levelStation = getNearbyLevelStation(playerCenterX, playerCenterY);
            const nearDoor = !baseDoorOpen && isPlayerNearDoor(playerCenterX, playerCenterY);
            const wardrobeStation = getNearbyWardrobeStation(playerCenterX, playerCenterY);

            if (!station && !nearDoor && !gStation && !modStation && !skillStation && !levelStation && !wardrobeStation) {
                return;
            }

            let prompt = '';
            if (station) {
                if (isWeaponUnlocked(station.id)) {
                    prompt = `Press E to take ${weaponConfigs[station.id].name}`;
                } else {
                    const unlockCost = getWeaponUnlockCost(station.id);
                    if (money >= unlockCost) {
                        prompt = `Press E to unlock ${weaponConfigs[station.id].name} (${unlockCost} crumbs)`;
                    } else {
                        prompt = `${weaponConfigs[station.id].name} unlock: ${unlockCost} crumbs (You have ${money})`;
                    }
                }
            } else if (gStation) {
                const gName = grenadeTypes[gStation.type] ? grenadeTypes[gStation.type].name : gStation.type;
                const effMax = getEffectiveGrenadeMax();
                if (grenadeCount >= effMax) {
                    prompt = `Grenade slots full (${grenadeCount}/${effMax})`;
                } else if (money >= grenadeBaseCost) {
                    prompt = `Press E to buy ${gName} Grenade (${grenadeBaseCost} crumbs) — have ${grenadeCount}/${effMax}`;
                } else {
                    prompt = `${gName} Grenade: ${grenadeBaseCost} crumbs (You have ${money})`;
                }
            } else if (modStation) {
                const def = weaponModDefs[modStation.id];
                const onMain = equippedMods.main.includes(modStation.id);
                const onSide = equippedMods.sidearm.includes(modStation.id);
                if (!onMain && !onSide) {
                    if (money >= def.cost) {
                        prompt = `Press E to buy ${def.name} mod (${def.cost} crumbs) → equips to MAIN`;
                    } else {
                        prompt = `${def.name}: ${def.cost} crumbs (You have ${money})`;
                    }
                } else if (onMain) {
                    prompt = `Press E to move ${def.name} from MAIN → SIDEARM`;
                } else {
                    prompt = `Press E to unequip ${def.name} from SIDEARM`;
                }
            } else if (skillStation) {
                const def = skillStation.type === 'passive' ? passiveSkillDefs[skillStation.id] : activeSkillDefs[skillStation.id];
                const arr = skillStation.type === 'passive' ? learnedSkills.passive : learnedSkills.active;
                if (arr.includes(skillStation.id)) {
                    prompt = `${def.name} already learned`;
                } else if (money >= def.cost) {
                    prompt = `Press E to learn ${def.name} (${def.cost} crumbs) — ${def.desc}`;
                } else {
                    prompt = `${def.name}: ${def.cost} crumbs (You have ${money})`;
                }
            } else if (levelStation) {
                if (!levelStation.unlocked) {
                    const prevLevel = levelStation.id - 1;
                    const prevNames = { 1: 'The House', 2: 'Basement', 3: 'Attic' };
                    prompt = `${levelStation.name} locked — extract from ${prevNames[prevLevel] || 'previous level'} to unlock`;
                } else if (currentLevel === levelStation.id) {
                    prompt = `${levelStation.name} already selected`;
                } else {
                    prompt = `Press E to select ${levelStation.name}`;
                }
            } else if (wardrobeStation) {
                const def = skinDefs[wardrobeStation.id];
                const isOwned = unlockedSkins.includes(wardrobeStation.id);
                const isEquipped = equippedSkinId === wardrobeStation.id;
                if (isEquipped) {
                    prompt = `${def.name} skin is equipped`;
                } else if (isOwned) {
                    prompt = `Press E to wear the ${def.name} skin`;
                } else if (money >= def.cost) {
                    prompt = `Press E to buy ${def.name} skin (${def.cost} crumbs)`;
                } else {
                    prompt = `${def.name} skin: ${def.cost} crumbs (You have ${money})`;
                }
            } else if (nearDoor) {
                const lvlName = (levelDefs.find(l => l.id === currentLevel) || {}).name || 'Level ' + currentLevel;
                prompt = `Press E to enter the burrow — ${lvlName}`;
            }

            ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
            ctx.fillRect(canvas.width / 2 - 260, canvas.height - 90, 520, 32);
            ctx.fillStyle = '#ffffff';
            ctx.font = '16px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(prompt, canvas.width / 2, canvas.height - 74);
        }

        // Draw difficulty bar at top of screen
        function drawDifficultyBar() {
            const barWidth = 300;
            const barHeight = 20;
            const barX = canvas.width / 2 - barWidth / 2;
            const barY = 20;

            // Background
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, barHeight);

            // Filled portion (gradient from green to red based on level)
            const fillWidth = (difficultyProgress / 100) * barWidth;
            const colorValue = Math.floor((difficulty / maxDifficulty) * 255);
            ctx.fillStyle = `rgb(${colorValue}, ${255 - colorValue}, 0)`;
            ctx.fillRect(barX, barY, fillWidth, barHeight);

            // Border
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);

            // Text
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(`Level ${difficulty} - ${Math.floor(difficultyProgress)}%`, canvas.width / 2, barY + barHeight / 2);
        }

        // Draw money counter
        function drawMoneyCounter() {
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 20px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'top';
            ctx.fillText(`$${money}`, 20, 20);
            
            // Draw coin icon
            ctx.beginPath();
            ctx.arc(15, 27, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = '#cc9900';
            ctx.lineWidth = 1;
            ctx.stroke();
        }

        // Draw health bar
        function drawHealthBar() {
            const barWidth = 200;
            const barHeight = 20;
            const barX = 20;
            const barY = 50;

            // Background
            ctx.fillStyle = '#333';
            ctx.fillRect(barX, barY, barWidth, barHeight);

            // Health fill (green to red based on health)
            const healthPercent = player.health / player.maxHealth;
            ctx.fillStyle = healthPercent > 0.5 ? '#00ff00' : healthPercent > 0.25 ? '#ffaa00' : '#ff0000';
            ctx.fillRect(barX, barY, barWidth * healthPercent, barHeight);

            // Border
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.strokeRect(barX, barY, barWidth, barHeight);

            // Text
            ctx.fillStyle = '#fff';
            ctx.font = '14px Arial';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(`HP: ${player.health}/${player.maxHealth}`, barX + 5, barY + barHeight / 2);
        }

        function setBaseDoorOpen(open) {
            baseDoorOpen = open;
            const index = obstacles.indexOf(baseDoorObstacle);
            if (open) {
                if (index !== -1) {
                    obstacles.splice(index, 1);
                }
            } else if (index === -1) {
                obstacles.push(baseDoorObstacle);
            }
        }

        function isPlayerNearDoor(playerCenterX, playerCenterY) {
            const doorCenterX = baseDoorObstacle.x + baseDoorObstacle.width / 2;
            const doorCenterY = baseDoorObstacle.y + baseDoorObstacle.height / 2;
            return Math.hypot(playerCenterX - doorCenterX, playerCenterY - doorCenterY) <= baseInteractRange;
        }

        function getNearbyWeaponStation(playerCenterX, playerCenterY) {
            for (let station of weaponStations) {
                const centerX = station.x + station.width / 2;
                const centerY = station.y + station.height / 2;
                if (Math.hypot(playerCenterX - centerX, playerCenterY - centerY) <= weaponInteractRange) {
                    return station;
                }
            }
            return null;
        }
        
        function getNearbyUpgradeStation(playerCenterX, playerCenterY) {
            const interactRange = 80;
            for (let station of upgradeStations) {
                const centerX = station.x + station.width / 2;
                const centerY = station.y + station.height / 2;
                if (Math.hypot(playerCenterX - centerX, playerCenterY - centerY) <= interactRange) {
                    return station;
                }
            }
            return null;
        }

        function getNearbyGrenadeStation(playerCenterX, playerCenterY) {
            const interactRange = 80;
            for (let station of grenadeStations) {
                const cx = station.x + station.width / 2;
                const cy = station.y + station.height / 2;
                if (Math.hypot(playerCenterX - cx, playerCenterY - cy) <= interactRange) {
                    return station;
                }
            }
            return null;
        }

        function getNearbyModStation(playerCenterX, playerCenterY) {
            const interactRange = 80;
            for (let station of modStations) {
                const cx = station.x + station.width / 2;
                const cy = station.y + station.height / 2;
                if (Math.hypot(playerCenterX - cx, playerCenterY - cy) <= interactRange) return station;
            }
            return null;
        }

        function getNearbySkillStation(playerCenterX, playerCenterY) {
            const interactRange = 80;
            for (let station of skillStations) {
                const cx = station.x + station.width / 2;
                const cy = station.y + station.height / 2;
                if (Math.hypot(playerCenterX - cx, playerCenterY - cy) <= interactRange) return station;
            }
            return null;
        }

        function getNearbyLevelStation(playerCenterX, playerCenterY) {
            const interactRange = 80;
            for (let station of levelStations) {
                const cx = station.x + station.width / 2;
                const cy = station.y + station.height / 2;
                if (Math.hypot(playerCenterX - cx, playerCenterY - cy) <= interactRange) return station;
            }
            return null;
        }

        function getNearbyWardrobeStation(playerCenterX, playerCenterY) {
            const interactRange = 80;
            for (let station of wardrobeStations) {
                const cx = station.x + station.width / 2;
                const cy = station.y + station.height / 2;
                if (Math.hypot(playerCenterX - cx, playerCenterY - cy) <= interactRange) return station;
            }
            return null;
        }

        function handleBaseInteract() {
            if (gameState !== 'base') {
                return false;
            }
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const station = getNearbyWeaponStation(playerCenterX, playerCenterY);
            if (station) {
                if (isWeaponUnlocked(station.id)) {
                    // Assign to correct slot based on category
                    if (weaponConfigs[station.id].category === 'sidearm') {
                        sidearmId = station.id;
                    } else {
                        selectedWeaponId = station.id;
                    }
                    applySelectedWeapon(true);
                    return true;
                }

                const unlockCost = getWeaponUnlockCost(station.id);
                if (money >= unlockCost) {
                    money -= unlockCost;
                    saveBankedCrumbs();
                    unlockWeapon(station.id);
                    if (weaponConfigs[station.id].category === 'sidearm') {
                        sidearmId = station.id;
                    } else {
                        selectedWeaponId = station.id;
                    }
                    applySelectedWeapon(true);
                    playSound(850, 0.1, 'sine');
                    return true;
                }

                playSound(150, 0.08, 'square');
                return false;
            }

            // Grenade station interaction
            const gStation = getNearbyGrenadeStation(playerCenterX, playerCenterY);
            if (gStation) {
                const effMax = getEffectiveGrenadeMax();
                if (money >= grenadeBaseCost && grenadeCount < effMax) {
                    money -= grenadeBaseCost;
                    saveBankedCrumbs();
                    equippedGrenadeType = gStation.type;
                    grenadeCount = Math.min(grenadeCount + 1, effMax);
                    playSound(800, 0.1, 'sine');
                    return true;
                }
                playSound(150, 0.08, 'square');
                return false;
            }
            // Mod station interaction: not equipped → buy+equip main → move to sidearm → unequip
            const modStation = getNearbyModStation(playerCenterX, playerCenterY);
            if (modStation) {
                const def = weaponModDefs[modStation.id];
                const onMain = equippedMods.main.includes(modStation.id);
                const onSide = equippedMods.sidearm.includes(modStation.id);
                if (!onMain && !onSide) {
                    if (money >= def.cost) {
                        money -= def.cost;
                        saveBankedCrumbs();
                        equippedMods.main.push(modStation.id);
                        playSound(850, 0.1, 'sine');
                        return true;
                    }
                    playSound(150, 0.08, 'square');
                    return false;
                } else if (onMain) {
                    equippedMods.main = equippedMods.main.filter(id => id !== modStation.id);
                    equippedMods.sidearm.push(modStation.id);
                    playSound(700, 0.08, 'sine');
                    return true;
                } else {
                    equippedMods.sidearm = equippedMods.sidearm.filter(id => id !== modStation.id);
                    playSound(400, 0.08, 'square');
                    return true;
                }
            }

            // Skill station interaction: buy skill permanently
            const skillStation = getNearbySkillStation(playerCenterX, playerCenterY);
            if (skillStation) {
                const def = skillStation.type === 'passive' ? passiveSkillDefs[skillStation.id] : activeSkillDefs[skillStation.id];
                const arr = skillStation.type === 'passive' ? learnedSkills.passive : learnedSkills.active;
                if (arr.includes(skillStation.id)) {
                    playSound(400, 0.05, 'sine');
                    return false;
                }
                if (money >= def.cost) {
                    money -= def.cost;
                    saveBankedCrumbs();
                    arr.push(skillStation.id);
                    playSound(950, 0.12, 'sine');
                    return true;
                }
                playSound(150, 0.08, 'square');
                return false;
            }

            // Level station interaction: select level
            const levelStation = getNearbyLevelStation(playerCenterX, playerCenterY);
            if (levelStation) {
                if (levelStation.unlocked) {
                    currentLevel = levelStation.id;
                    playSound(600, 0.08, 'sine');
                    return true;
                }
                playSound(150, 0.08, 'square');
                return false;
            }

            // Wardrobe station interaction: buy or equip skin
            const wardrobeStation = getNearbyWardrobeStation(playerCenterX, playerCenterY);
            if (wardrobeStation) {
                const def = skinDefs[wardrobeStation.id];
                const isOwned = unlockedSkins.includes(wardrobeStation.id);
                if (isOwned) {
                    equippedSkinId = wardrobeStation.id;
                    localStorage.setItem('mh_equippedSkin', equippedSkinId);
                    playSound(780, 0.1, 'sine');
                    return true;
                }
                if (money >= def.cost) {
                    money -= def.cost;
                    saveBankedCrumbs();
                    unlockedSkins.push(wardrobeStation.id);
                    localStorage.setItem('mh_unlockedSkins', JSON.stringify(unlockedSkins));
                    equippedSkinId = wardrobeStation.id;
                    localStorage.setItem('mh_equippedSkin', equippedSkinId);
                    playSound(950, 0.12, 'sine');
                    return true;
                }
                playSound(150, 0.08, 'square');
                return false;
            }

            if (!baseDoorOpen && isPlayerNearDoor(playerCenterX, playerCenterY)) {
                window.location.href = `game.html?${buildGameStateQuery()}&v=20260315b`;
                return true;
            }
            return false;
        }

        function resetRunState() {
            isPaused = false;
            applySelectedWeapon(true);
            player.health = player.maxHealth;
            player.isReloading = false;
            player.fireCooldown = 0;
            player.invulnerable = false;
            player.invulnerableTime = 0;
            player.hitTimer = 0;
            player.dashCooldown = 0;
            player.dashTimer = 0;
            player.dashVelocityX = 0;
            player.dashVelocityY = 0;
            player.meleeCooldown = 0;
            player.meleeEffectTimer = 0;
            mouseButtons.left = false;
            screenShake.intensity = 0;
            screenShake.timer = 0;
            difficulty = 1;
            difficultyProgress = 0;
            enemies.length = 0;
            bullets.length = 0;
            enemyBullets.length = 0;
            coins.length = 0;
            particles.length = 0;
            spawnTimer = 0;
            runEnemiesKilled = 0;
            runMoneyEarned = 0;
        }

        function resetToBase() {
            resetRunState();
            player.x = baseConfig.x + baseConfig.width / 2 - player.width / 2;
            player.y = baseConfig.y + baseConfig.height / 2 - player.height / 2;
            setBaseDoorOpen(false);
            deathTimer = 0;
            deathMoneyCount = 0;
            deathKillsCount = 0;
            continueButtonHover = false;
        }

        function enterBase() {
            loadTransientStateFromQuery();
            applySelectedWeapon(false);
            resetToBase();
            gameState = 'base';
        }

        function startRunFromBase() {
            if (gameState !== 'base') {
                return;
            }
            setBaseDoorOpen(true);
            resetRunState();
            gameState = 'playing';
        }

        // Draw hub screen
        function drawHubScreen() {
            // Background
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Title
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 64px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('EXTRACTION SHOOTER', canvas.width / 2, canvas.height / 3);

            // Money display
            ctx.fillStyle = '#ffcc00';
            ctx.font = 'bold 32px Arial';
            ctx.fillText(`Money: $${money}`, canvas.width / 2, canvas.height / 2 - 20);
            
            // Total kills
            ctx.fillStyle = '#ff6666';
            ctx.font = 'bold 24px Arial';
            ctx.fillText(`Total Kills: ${enemiesKilled}`, canvas.width / 2, canvas.height / 2 + 20);

            // Instructions
            ctx.fillStyle = '#ffffff';
            ctx.font = '22px Arial';
            ctx.fillText('Controls: WASD move, Left Click shoot, Right Click melee, Space dash', canvas.width / 2, canvas.height / 2 + 90);
            ctx.fillText('E interact, R reload, ESC pause', canvas.width / 2, canvas.height / 2 + 122);

            const playButton = getHubPlayButton();
            ctx.fillStyle = '#1f1f1f';
            ctx.fillRect(playButton.x, playButton.y, playButton.width, playButton.height);
            ctx.strokeStyle = '#00ff00';
            ctx.lineWidth = 3;
            ctx.strokeRect(playButton.x, playButton.y, playButton.width, playButton.height);
            ctx.fillStyle = '#00ff00';
            ctx.font = 'bold 24px Arial';
            ctx.textBaseline = 'middle';
            ctx.fillText('PLAY', playButton.x + playButton.width / 2, playButton.y + playButton.height / 2);

            ctx.font = '18px Arial';
            ctx.fillStyle = '#aaaaaa';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText('Press Space or click Play to enter the base', canvas.width / 2, canvas.height - 100);
        }

        // Update death screen
        function updateDeathScreen() {
            deathTimer++;
            
            const explosionDuration = 200;
            
            // Count up money after explosion + 120 frames (2 seconds)
            if (deathTimer > explosionDuration + 120 && deathMoneyCount < runMoneyEarned) {
                deathMoneyCount += Math.ceil((runMoneyEarned - deathMoneyCount) * 0.1);
                if (deathMoneyCount > runMoneyEarned) deathMoneyCount = runMoneyEarned;
            }
            
            // Count up kills after explosion + 180 frames (3 seconds)
            if (deathTimer > explosionDuration + 180 && deathKillsCount < runEnemiesKilled) {
                deathKillsCount += Math.ceil((runEnemiesKilled - deathKillsCount) * 0.1);
                if (deathKillsCount > runEnemiesKilled) deathKillsCount = runEnemiesKilled;
            }
        }

        // Draw death screen
        function drawDeathScreen() {
            // Slow motion effect on particles
            const slowMoFactor = 0.3;
            
            // Update particles in slow motion
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].velocityX * slowMoFactor;
                particles[i].y += particles[i].velocityY * slowMoFactor;
                particles[i].life -= 0.3;

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Draw game background dimmed
            drawBackground();
            drawObstacles();
            drawEnemies();
            drawBullets();
            drawEnemyBullets();
            drawParticles();
            
            // Only start showing overlay after explosion finishes (200 frames = ~3.3 seconds in slow-mo)
            const explosionDuration = 200;
            
            // Dark overlay - starts after explosion
            if (deathTimer > explosionDuration) {
                const overlayAlpha = Math.min((deathTimer - explosionDuration) / 60, 0.8);
                ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // "YOU DIED" text - fade in after overlay starts
            if (deathTimer > explosionDuration + 30) {
                const textAlpha = Math.min((deathTimer - explosionDuration - 30) / 60, 1);
                ctx.globalAlpha = textAlpha;
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 96px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('YOU DIED', canvas.width / 2, canvas.height / 3);
                ctx.globalAlpha = 1;
            }
            
            // Stats - appear after "YOU DIED"
            if (deathTimer > explosionDuration + 90) {
                const statsAlpha = Math.min((deathTimer - explosionDuration - 90) / 30, 1);
                ctx.globalAlpha = statsAlpha;
                
                // Money earned
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 32px Arial';
                ctx.fillText(`Money Earned: $${deathMoneyCount}`, canvas.width / 2, canvas.height / 2 + 20);
                
                // Enemies killed
                ctx.fillStyle = '#ff6666';
                ctx.fillText(`Enemies Killed: ${deathKillsCount}`, canvas.width / 2, canvas.height / 2 + 70);
                
                ctx.globalAlpha = 1;
            }
            
            // Continue button - appears after stats finish counting
            if (deathTimer > explosionDuration + 240 && deathMoneyCount >= runMoneyEarned && deathKillsCount >= runEnemiesKilled) {
                const buttonAlpha = Math.min((deathTimer - explosionDuration - 240) / 30, 1);
                ctx.globalAlpha = buttonAlpha;
                
                const buttonWidth = 200;
                const buttonHeight = 50;
                const buttonX = canvas.width / 2 - buttonWidth / 2;
                const buttonY = canvas.height / 2 + 140;
                
                // Button background
                ctx.fillStyle = continueButtonHover ? '#00aa00' : '#008800';
                ctx.fillRect(buttonX, buttonY, buttonWidth, buttonHeight);
                
                // Button border
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.strokeRect(buttonX, buttonY, buttonWidth, buttonHeight);
                
                // Button text
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('CONTINUE', canvas.width / 2, buttonY + buttonHeight / 2);
                
                ctx.globalAlpha = 1;
            }
        }

        // Draw pause overlay
        function drawPauseOverlay() {
            // Semi-transparent overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Pause text
            ctx.fillStyle = '#ffffff';
            ctx.font = '48px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('PAUSED', canvas.width / 2, canvas.height / 2);

            // Instructions
            ctx.font = '24px Arial';
            ctx.fillText('Press ESC to resume', canvas.width / 2, canvas.height / 2 + 50);
        }

        // Draw background
        function drawBackground() {
            // Warm house interior — off-white walls
            ctx.fillStyle = '#f5f0e8';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Wood floor (full base area)
            ctx.fillStyle = '#d4a96a';
            ctx.fillRect(-camera.x, -camera.y, mapWidth, mapHeight);

            // Wood grain lines
            ctx.save();
            ctx.strokeStyle = '#c09050';
            ctx.lineWidth = 1;
            ctx.globalAlpha = 0.35;
            const grainSpacing = 18;
            for (let y = (-camera.y) % grainSpacing; y < canvas.height + grainSpacing; y += grainSpacing) {
                const worldY = y + camera.y;
                ctx.beginPath();
                ctx.moveTo(0, y + Math.sin(worldY * 0.03) * 1.5);
                ctx.lineTo(canvas.width, y + Math.sin((worldY + canvas.width) * 0.03) * 1.5);
                ctx.stroke();
            }
            ctx.restore();
        }

        // Draw obstacles — household furniture with hand-drawn style
        function drawObstacles() {
            for (let obstacle of obstacles) {
                const ox = obstacle.x - camera.x;
                const oy = obstacle.y - camera.y;
                const ow = obstacle.width;
                const oh = obstacle.height;
                // Shadow
                ctx.save();
                ctx.globalAlpha = 0.18;
                ctx.fillStyle = '#000';
                ctx.fillRect(ox + 4, oy + 4, ow, oh);
                ctx.restore();
                // Fill
                ctx.fillStyle = '#8b6340';
                ctx.fillRect(ox, oy, ow, oh);
                // Wobbly border
                ctx.save();
                ctx.strokeStyle = '#5c3d1a';
                ctx.lineWidth = 2.5;
                const w = 2;
                ctx.beginPath();
                ctx.moveTo(ox + w * Math.sin(0), oy + w * Math.cos(0));
                ctx.lineTo(ox + ow + w * Math.sin(1), oy + w * Math.cos(1));
                ctx.lineTo(ox + ow + w * Math.sin(2), oy + oh + w * Math.cos(2));
                ctx.lineTo(ox + w * Math.sin(3), oy + oh + w * Math.cos(3));
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            }
        }

        // Game loop
        function gameLoop() {
            if (gameState === 'hub') {
                drawHubScreen();
            } else if (gameState === 'death') {
                updateDeathScreen();
                drawDeathScreen();
            } else if (gameState === 'base') {
                const shakeOffset = updateScreenShake();

                ctx.save();
                ctx.translate(shakeOffset.x, shakeOffset.y);
                drawBackground();

                if (!isPaused) {
                    updatePlayer();
                    updateBullets();
                    updateHitscanEffects();
                    updateParticles();
                    updateNoise();
                }

                drawPlayer();
                drawBullets();
                drawHitscanEffects();
                drawParticles();

                drawObstacles();
                drawBaseElements();

                ctx.restore();

                drawMoneyCounter();
                drawHealthBar();
                drawBasePrompts();

                if (isPaused) {
                    drawPauseOverlay();
                }
            } else if (gameState === 'playing') {
                const shakeOffset = updateScreenShake();

                ctx.save();
                ctx.translate(shakeOffset.x, shakeOffset.y);
                drawBackground();
                
                if (!isPaused) {
                    updatePlayer();
                    updateBullets();
                    updateEnemyBullets();
                    updateHitscanEffects();
                    updateParticles();
                    updateNoise();
                    updateDifficulty();
                    spawnEnemies();
                    updateEnemies();
                    updateCoins();
                }
                
                drawPlayer();
                drawBullets();
                drawEnemyBullets();
                drawHitscanEffects();
                drawParticles();
                drawCoins();
                drawEnemies();
                
                // Draw lighting effect before obstacles
                drawLightingEffect();

                // Draw obstacles on top so they're always visible
                drawObstacles();
                drawBaseElements();

                ctx.restore();
                
                drawDifficultyBar();
                drawMoneyCounter();
                drawHealthBar();

                if (isPaused) {
                    drawPauseOverlay();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        enterBase();

        // Start game
        gameLoop();
    </script>
