        // Draw BURROW arrow when far from extraction
        function drawBurrowArrow() {
            const doorCenterX = extractDoor.x + extractDoor.width / 2;
            const doorCenterY = extractDoor.y + extractDoor.height / 2;
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const dist = Math.hypot(doorCenterX - playerCenterX, doorCenterY - playerCenterY);
            if (dist < 1500) return;

            const angle = Math.atan2(doorCenterY - playerCenterY, doorCenterX - playerCenterX);
            const arrowX = canvas.width / 2 + Math.cos(angle) * (Math.min(canvas.width, canvas.height) * 0.38);
            const arrowY = canvas.height / 2 + Math.sin(angle) * (Math.min(canvas.width, canvas.height) * 0.38);

            ctx.save();
            ctx.translate(arrowX, arrowY);
            ctx.rotate(angle);
            ctx.fillStyle = '#e8c060';
            ctx.globalAlpha = 0.8 + 0.2 * Math.sin(performance.now() * 0.006);
            ctx.beginPath();
            ctx.moveTo(14, 0);
            ctx.lineTo(-8, -8);
            ctx.lineTo(-5, 0);
            ctx.lineTo(-8, 8);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            ctx.fillStyle = '#e8c060';
            ctx.globalAlpha = 0.9;
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('BURROW', arrowX + Math.cos(angle) * 22, arrowY + Math.sin(angle) * 22);
            ctx.globalAlpha = 1;
        }

        function getValidPlayerSpawn() {
            // Define safe spawn areas (center of main walkable zones)
            const safeLocations = [
                { x: 3200, y: 2200 },  // Middle of top zone
                { x: 4300, y: 2500 },  // Center-ish
                { x: 2500, y: 2800 },  // Left-center
                { x: 5500, y: 2800 },  // Right-center
                { x: 3800, y: 3500 }   // Lower center
            ];

            // Test each safe location
            for (let loc of safeLocations) {
                if (!checkObstacleCollision(loc.x, loc.y, player.width, player.height)) {
                    return loc;
                }
            }

            // Fallback: find the closest valid position near center
            const centerX = mapWidth / 2;
            const centerY = mapHeight / 2;
            let bestSpawn = null;
            let bestDistance = Infinity;

            for (let attempt = 0; attempt < 50; attempt++) {
                const spawn = getRandomWalkablePosition(player.width, player.height);
                const distance = Math.hypot(spawn.x - centerX, spawn.y - centerY);
                
                if (distance < bestDistance) {
                    bestDistance = distance;
                    bestSpawn = spawn;
                }
            }

            return bestSpawn || { x: 3200, y: 2200 };
        }

        // Procedural level layout generator — runs every time a level is loaded
        function generateLevelLayout() {
            const level = currentLevel;
            const MAP_W = 8600, MAP_H = 6200;
            const MARGIN = 350;
            const COLS = 3, ROWS = 2;
            const cellW = (MAP_W - MARGIN * 2) / COLS;
            const cellH = (MAP_H - MARGIN * 2) / ROWS;
            const CORRIDOR_W = 220;

            const rc = {
                1: { minW: 1400, maxW: 2000, minH: 900,  maxH: 1400 },
                2: { minW: 1200, maxW: 1800, minH: 800,  maxH: 1300 },
                3: { minW: 1500, maxW: 2200, minH: 700,  maxH: 1000 },
                4: { minW: 1600, maxW: 2400, minH: 1200, maxH: 1800 }
            }[level] || { minW: 1200, maxW: 2000, minH: 800, maxH: 1400 };

            const rooms = [];
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS; col++) {
                    const rw = rc.minW + Math.random() * (rc.maxW - rc.minW);
                    const rh = rc.minH + Math.random() * (rc.maxH - rc.minH);
                    const cellX = MARGIN + col * cellW;
                    const cellY = MARGIN + row * cellH;
                    const jx = (Math.random() - 0.5) * (cellW - rw) * 0.4;
                    const jy = (Math.random() - 0.5) * (cellH - rh) * 0.4;
                    rooms.push({
                        x: Math.round(cellX + (cellW - rw) / 2 + jx),
                        y: Math.round(cellY + (cellH - rh) / 2 + jy),
                        width: Math.round(rw), height: Math.round(rh),
                        col, row
                    });
                }
            }

            const corridors = [];
            // Horizontal corridors (left-right between same-row adjacent rooms)
            for (let row = 0; row < ROWS; row++) {
                for (let col = 0; col < COLS - 1; col++) {
                    const a = rooms[row * COLS + col];
                    const b = rooms[row * COLS + col + 1];
                    const x1 = a.x + a.width, x2 = b.x;
                    if (x2 > x1 + 10) {
                        const yLo = Math.max(a.y, b.y) + 20;
                        const yHi = Math.min(a.y + a.height, b.y + b.height) - CORRIDOR_W - 20;
                        const cy = yHi > yLo
                            ? yLo + Math.random() * (yHi - yLo)
                            : (a.y + a.height / 2 + b.y + b.height / 2) / 2 - CORRIDOR_W / 2;
                        corridors.push({ x: x1, y: Math.round(cy), width: x2 - x1, height: CORRIDOR_W });
                    }
                }
            }
            // Vertical corridors (top-bottom between same-col adjacent rooms)
            for (let col = 0; col < COLS; col++) {
                for (let row = 0; row < ROWS - 1; row++) {
                    const a = rooms[row * COLS + col];
                    const b = rooms[(row + 1) * COLS + col];
                    const y1 = a.y + a.height, y2 = b.y;
                    if (y2 > y1 + 10) {
                        const xLo = Math.max(a.x, b.x) + 20;
                        const xHi = Math.min(a.x + a.width, b.x + b.width) - CORRIDOR_W - 20;
                        const cx = xHi > xLo
                            ? xLo + Math.random() * (xHi - xLo)
                            : (a.x + a.width / 2 + b.x + b.width / 2) / 2 - CORRIDOR_W / 2;
                        corridors.push({ x: Math.round(cx), y: y1, width: CORRIDOR_W, height: y2 - y1 });
                    }
                }
            }

            const zones = [
                ...rooms.map(r => ({ x: r.x, y: r.y, width: r.width, height: r.height })),
                ...corridors
            ];

            const obs = [], haz = [];
            for (const room of rooms) generateRoomObstacles(room, obs, haz, level);

            const spawnRoom = rooms[0];
            const spawnPos = [
                Math.round(spawnRoom.x + spawnRoom.width / 2),
                Math.round(spawnRoom.y + spawnRoom.height / 2)
            ];

            return { zones, obstacles: obs, hazards: haz, spawnPos };
        }

        function generateRoomObstacles(room, obs, haz, level) {
            const { x, y, width, height } = room;
            const rand = (min, max) => min + Math.random() * (max - min);
            const randInt = (min, max) => Math.floor(min + Math.random() * (max - min + 1));
            const safeObs = (ox, oy, ow, oh) => {
                if (ox < x + 80 || oy < y + 80 || ox + ow > x + width - 80 || oy + oh > y + height - 80) return;
                obs.push({ x: Math.round(ox), y: Math.round(oy), width: Math.round(ow), height: Math.round(oh) });
            };

            if (level === 1) {
                // House: wall segments + pillars
                const numWalls = randInt(2, 4);
                for (let i = 0; i < numWalls; i++) {
                    if (Math.random() < 0.5) {
                        safeObs(rand(x+150, x+width*0.55), rand(y+200, y+height-200), rand(200, 500), 60);
                    } else {
                        safeObs(rand(x+200, x+width-200), rand(y+150, y+height*0.55), 60, rand(150, 350));
                    }
                }
                const numPillars = randInt(3, 6);
                for (let i = 0; i < numPillars; i++) {
                    safeObs(rand(x+120, x+width-200), rand(y+120, y+height-200), rand(80,130), rand(80,130));
                }
                if (Math.random() < 0.65) {
                    haz.push({ x:Math.round(rand(x+150,x+width-550)), y:Math.round(rand(y+150,y+height-400)),
                               width:Math.round(rand(400,600)), height:Math.round(rand(250,380)), type:'rug' });
                }
            } else if (level === 2) {
                // Basement: shelving units + boxes + puddles + occasional wire
                const numShelves = randInt(2, 4);
                for (let i = 0; i < numShelves; i++) {
                    safeObs(rand(x+100,x+width*0.6), rand(y+120,y+height-200), rand(150,260), 55);
                }
                const numBoxes = randInt(3, 6);
                for (let i = 0; i < numBoxes; i++) {
                    safeObs(rand(x+100,x+width-200), rand(y+100,y+height-200), rand(90,150), rand(90,150));
                }
                if (Math.random() < 0.55) {
                    haz.push({ x:Math.round(rand(x+150,x+width-400)), y:Math.round(rand(y+150,y+height-300)),
                               width:Math.round(rand(200,320)), height:Math.round(rand(120,180)), type:'puddle' });
                }
                if (Math.random() < 0.3) {
                    haz.push({ x:Math.round(rand(x+200,x+width-400)), y:Math.round(rand(y+100,y+height-160)),
                               width:Math.round(rand(200,300)), height:28, type:'wire' });
                }
            } else if (level === 3) {
                // Attic: structural beams + storage trunks + tape
                if (Math.random() < 0.45 && width > 1600) {
                    const bx = rand(x + width*0.35, x + width*0.55);
                    obs.push({ x:Math.round(bx), y:y, width:Math.round(rand(260,360)), height:height });
                }
                const numBoxes = randInt(4, 7);
                for (let i = 0; i < numBoxes; i++) {
                    safeObs(rand(x+80,x+width-200), rand(y+80,y+height-180), rand(100,200), rand(70,120));
                }
                if (Math.random() < 0.6) {
                    haz.push({ x:Math.round(rand(x+100,x+width-380)), y:Math.round(rand(y+80,y+height-180)),
                               width:Math.round(rand(200,320)), height:38, type:'tape' });
                }
            } else if (level === 4) {
                // Yard: hedge rows + rocks + mud + garden beds
                const numHedges = randInt(1, 3);
                for (let i = 0; i < numHedges; i++) {
                    if (Math.random() < 0.65) {
                        safeObs(rand(x+100,x+width*0.55), rand(y+150,y+height-300), rand(300,600), 50);
                    } else {
                        safeObs(rand(x+200,x+width-300), rand(y+100,y+height*0.55), 50, rand(200,400));
                    }
                }
                const numRocks = randInt(3, 7);
                for (let i = 0; i < numRocks; i++) {
                    safeObs(rand(x+100,x+width-180), rand(y+100,y+height-180), rand(65,120), rand(65,110));
                }
                if (Math.random() < 0.5) {
                    haz.push({ x:Math.round(rand(x+200,x+width-500)), y:Math.round(rand(y+150,y+height-300)),
                               width:Math.round(rand(250,400)), height:Math.round(rand(150,220)), type:'mud' });
                }
                if (Math.random() < 0.45) {
                    haz.push({ x:Math.round(rand(x+100,x+width-500)), y:Math.round(rand(y+100,y+height-250)),
                               width:Math.round(rand(300,500)), height:150, type:'gardenBed', isGardenBed:true });
                }
            }
        }

        // Randomize obstacle positions within amplitude pixels each run
        function jitterObstacles(baseObstacles, amplitude, skipPredicate) {
            return baseObstacles.map(o => {
                if (skipPredicate && skipPredicate(o)) return { ...o };
                return {
                    ...o,
                    x: o.x + (Math.random() - 0.5) * amplitude * 2,
                    y: o.y + (Math.random() - 0.5) * amplitude * 2
                };
            });
        }

        function setLevelData() {
            envHazards.length = 0;
            const layout = generateLevelLayout();
            walkableZones.length = 0;
            layout.zones.forEach(z => walkableZones.push(z));
            obstacles.length = 0;
            layout.obstacles.forEach(o => obstacles.push(o));
            layout.hazards.forEach(h => envHazards.push(h));
            levelSpawnPos = layout.spawnPos;

            // Per-biome decorative generation using the new walkableZones
            if (currentLevel === 2) {
                levelCracks.length = 0;
                for (const zone of walkableZones) {
                    for (let i = 0; i < 6; i++) {
                        const cx = zone.x + Math.random() * zone.width;
                        const cy = zone.y + Math.random() * zone.height;
                        const len = 30 + Math.random() * 80;
                        const a = Math.random() * Math.PI * 2;
                        levelCracks.push({ x1: cx, y1: cy, x2: cx + Math.cos(a)*len, y2: cy + Math.sin(a)*len });
                    }
                }
            } else if (currentLevel === 3) {
                atticCobwebs.length = 0;
                for (const zone of walkableZones) {
                    const corners = [
                        [zone.x + 50, zone.y + 50],
                        [zone.x + zone.width - 50, zone.y + 50],
                        [zone.x + 50, zone.y + zone.height - 50],
                        [zone.x + zone.width - 50, zone.y + zone.height - 50]
                    ];
                    for (const [wcx, wcy] of corners) {
                        if (Math.random() < 0.5) {
                            const strands = 3 + Math.floor(Math.random() * 3);
                            for (let s = 0; s < strands; s++) {
                                const len = 40 + Math.random() * 80;
                                const a = Math.random() * Math.PI * 2;
                                atticCobwebs.push({ x1: wcx, y1: wcy, x2: wcx + Math.cos(a)*len, y2: wcy + Math.sin(a)*len });
                            }
                        }
                    }
                }
                levelCracks.length = 0;
            } else if (currentLevel === 4) {
                yardGrassTufts.length = 0;
                for (const zone of walkableZones) {
                    const count = Math.floor((zone.width * zone.height) / 25000);
                    for (let i = 0; i < count; i++) {
                        yardGrassTufts.push({
                            x: zone.x + Math.random() * zone.width,
                            y: zone.y + Math.random() * zone.height,
                            size: 6 + Math.random() * 10,
                            angle: Math.random() * Math.PI * 2
                        });
                    }
                }
                levelCracks.length = 0;
            } else {
                levelCracks.length = 0;
            }
        }

        function resetRunState() {
            isPaused = false;
            loadTransientStateFromQuery();
            setLevelData();

            // Spawn at the center of the procedurally generated first room
            player.x = levelSpawnPos[0] - player.width / 2;
            player.y = levelSpawnPos[1] - player.height / 2;
            
            // Reset camera to follow new spawn position
            camera.x = player.x - canvas.width / 2 + player.width / 2;
            camera.y = player.y - canvas.height / 2 + player.height / 2;
            if (camera.x < 0) camera.x = 0;
            if (camera.x + canvas.width > mapWidth) camera.x = mapWidth - canvas.width;
            if (camera.y < 0) camera.y = 0;
            if (camera.y + canvas.height > mapHeight) camera.y = mapHeight - canvas.height;
            
            applySelectedWeapon(true);
            player.health = player.maxHealth;
            player.isReloading = false;
            player.fireCooldown = 0;
            player.invulnerable = false;
            player.invulnerableTime = 0;
            player.hitTimer = 0;
            player.dashCooldown = 0;
            player.dashTimer = 0;
            player.dashVelocityX = 0;
            player.dashVelocityY = 0;
            player.meleeCooldown = 0;
            player.meleeEffectTimer = 0;
            player.burnTimer = 0;
            player.burnTickTimer = 0;
            player.burnTickDamage = 0;
            player.burnVisualTimer = 0;
            player.poisonTimer = 0;
            player.poisonDamage = 0;
            weaponSwapCooldown = 0;
            mouseButtons.left = false;
            screenShake.intensity = 0;
            screenShake.timer = 0;
            difficulty = 1;
            difficultyProgress = 0;
            enemies.length = 0;
            deathMoneyPenalty = 0;
            bullets.length = 0;
            enemyBullets.length = 0;
            coins.length = 0;
            healingItems.length = 0;
            particles.length = 0;
            spawnTimer = 0;
            runEnemiesKilled = 0;
            runMoneyEarned = 0;
            activeGrenadeZones.length = 0;
            flyingGrenades.length = 0;
            // Reset slot states
            weaponSlotState.main.ammo = 0;
            weaponSlotState.main.isReloading = false;
            weaponSlotState.main.reloadTime = 0;
            weaponSlotState.main.fireCooldown = 0;
            weaponSlotState.sidearm.ammo = 0;
            weaponSlotState.sidearm.isReloading = false;
            weaponSlotState.sidearm.reloadTime = 0;
            weaponSlotState.sidearm.fireCooldown = 0;
            activeSlot = selectedWeaponId ? 'main' : 'sidearm';
            activeRunEvent = null;
            runEventTimer = 0;
            runEventCooldown = RUN_EVENT_MIN_INTERVAL;
            spawnExtractDoor();
        }

        // --- Mid-run event system ---
        const RUN_EVENT_TYPES = [
            { id: 'crumbTrail',  title: 'CRUMB TRAIL!',   desc: 'Extra loot spotted nearby!',    color: '#ffe080', duration: 600  },
            { id: 'pestControl', title: 'PEST CONTROL!',  desc: 'Spray incoming from the north!', color: '#88ff88', duration: 480  },
            { id: 'ratRaid',     title: 'RAT RAID!',      desc: 'A pack of rats swarms in!',      color: '#ff8888', duration: 300  },
            { id: 'foodDrop',    title: 'FOOD DROPPED!',  desc: 'Something fell off the counter.',color: '#ffcc44', duration: 600  }
        ];

        function triggerRunEvent() {
            const eligible = RUN_EVENT_TYPES;
            const def = eligible[Math.floor(Math.random() * eligible.length)];
            activeRunEvent = { ...def, timer: def.duration, flashTimer: 180 };

            if (def.id === 'crumbTrail' || def.id === 'foodDrop') {
                // Spawn a cluster of coins near the player
                const pcx = player.x + player.width / 2;
                const pcy = player.y + player.height / 2;
                const count = def.id === 'foodDrop' ? 20 : 12;
                for (let i = 0; i < count; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const dist = 100 + Math.random() * 300;
                    coins.push({
                        x: pcx + Math.cos(angle) * dist,
                        y: pcy + Math.sin(angle) * dist,
                        size: 7,
                        color: def.id === 'foodDrop' ? '#ffaa00' : '#ffcc00',
                        value: def.id === 'foodDrop' ? 8 : 4
                    });
                }
            } else if (def.id === 'ratRaid') {
                // Spawn extra rats immediately
                const count = 4 + Math.floor(difficulty / 3);
                for (let i = 0; i < count; i++) {
                    const spawn = getSpawnPointOffscreen(36, 36);
                    const e = spawnEnemyOfType('ratBruiser', spawn.x, spawn.y);
                    if (e) { e.commanderBuff = 120; enemies.push(e); }
                }
            } else if (def.id === 'pestControl') {
                // Add temporary slowing spray cloud env hazard
                const zoneX = player.x - 200 + Math.random() * 400;
                const sprayHazard = { x: zoneX, y: 400, width: 600, height: 400, type: 'spray', _sprayTimer: def.duration };
                envHazards.push(sprayHazard);
            }
        }

        function updateRunEvent() {
            if (runEventCooldown > 0) { runEventCooldown--; return; }
            if (!activeRunEvent) {
                // Random chance to trigger (scaled by difficulty)
                if (Math.random() < 0.0005 + difficulty * 0.00005) {
                    triggerRunEvent();
                    runEventCooldown = RUN_EVENT_MIN_INTERVAL;
                }
                return;
            }
            activeRunEvent.timer--;
            if (activeRunEvent.flashTimer > 0) activeRunEvent.flashTimer--;
            // Handle spray hazard expiry
            if (activeRunEvent.id === 'pestControl') {
                for (let i = envHazards.length - 1; i >= 0; i--) {
                    if (envHazards[i].type === 'spray') {
                        envHazards[i]._sprayTimer = (envHazards[i]._sprayTimer || 0) - 1;
                        if (envHazards[i]._sprayTimer <= 0) envHazards.splice(i, 1);
                    }
                }
            }
            if (activeRunEvent.timer <= 0) activeRunEvent = null;
        }

        function drawRunEventBanner() {
            if (!activeRunEvent || activeRunEvent.flashTimer <= 0) return;
            const alpha = Math.min(1, activeRunEvent.flashTimer / 30) * 0.92;
            const y = canvas.height / 2 - 80;
            ctx.save();
            ctx.globalAlpha = alpha;
            ctx.fillStyle = 'rgba(0,0,0,0.7)';
            ctx.fillRect(canvas.width / 2 - 260, y - 10, 520, 70);
            ctx.strokeStyle = activeRunEvent.color;
            ctx.lineWidth = 3;
            ctx.strokeRect(canvas.width / 2 - 260, y - 10, 520, 70);
            ctx.fillStyle = activeRunEvent.color;
            ctx.font = 'bold 26px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText(activeRunEvent.title, canvas.width / 2, y);
            ctx.fillStyle = '#dddddd';
            ctx.font = '15px Arial';
            ctx.fillText(activeRunEvent.desc, canvas.width / 2, y + 32);
            ctx.restore();
        }

        // Update death screen
        function updateDeathScreen() {
            deathTimer++;
            
            const explosionDuration = 200;
            
            // Count up money after explosion + 120 frames (2 seconds)
            if (deathTimer > explosionDuration + 120 && deathMoneyCount < runMoneyEarned) {
                deathMoneyCount += Math.ceil((runMoneyEarned - deathMoneyCount) * 0.1);
                if (deathMoneyCount > runMoneyEarned) deathMoneyCount = runMoneyEarned;
            }
            
            // Count up kills after explosion + 180 frames (3 seconds)
            if (deathTimer > explosionDuration + 180 && deathKillsCount < runEnemiesKilled) {
                deathKillsCount += Math.ceil((runEnemiesKilled - deathKillsCount) * 0.1);
                if (deathKillsCount > runEnemiesKilled) deathKillsCount = runEnemiesKilled;
            }
        }

        // Draw death screen
        function drawDeathScreen() {
            // Slow motion effect on particles
            const slowMoFactor = 0.3;
            
            // Update particles in slow motion
            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].x += particles[i].velocityX * slowMoFactor;
                particles[i].y += particles[i].velocityY * slowMoFactor;
                particles[i].life -= 0.3;

                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                }
            }
            
            // Draw game background dimmed
            drawBackground();
            drawObstacles();
            drawEnemies();
            drawBullets();
            drawEnemyBullets();
            drawParticles();
            
            // Only start showing overlay after explosion finishes (200 frames = ~3.3 seconds in slow-mo)
            const explosionDuration = 200;
            
            // Dark overlay - starts after explosion
            if (deathTimer > explosionDuration) {
                const overlayAlpha = Math.min((deathTimer - explosionDuration) / 60, 0.8);
                ctx.fillStyle = `rgba(0, 0, 0, ${overlayAlpha})`;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
            
            // "YOU DIED" text - fade in after overlay starts
            if (deathTimer > explosionDuration + 30) {
                const textAlpha = Math.min((deathTimer - explosionDuration - 30) / 60, 1);
                ctx.globalAlpha = textAlpha;
                ctx.fillStyle = '#ff0000';
                ctx.font = 'bold 96px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('YOU DIED', canvas.width / 2, canvas.height / 3);
                ctx.globalAlpha = 1;
            }
            
            // Stats - appear after "YOU DIED"
            if (deathTimer > explosionDuration + 90) {
                const statsAlpha = Math.min((deathTimer - explosionDuration - 90) / 30, 1);
                ctx.globalAlpha = statsAlpha;
                
                // Money earned
                ctx.fillStyle = '#ffcc00';
                ctx.font = 'bold 32px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(`Money Earned: $${deathMoneyCount}`, canvas.width / 2, canvas.height / 2 + 20);
                
                // Enemies killed
                ctx.fillStyle = '#ff6666';
                ctx.fillText(`Enemies Killed: ${deathKillsCount}`, canvas.width / 2, canvas.height / 2 + 70);
                
                // Death penalty message
                ctx.fillStyle = '#ff4444';
                ctx.font = 'bold 28px Arial';
                ctx.fillText(`⚠ MONEY LOST: -$${deathMoneyPenalty} (kept 10%)`, canvas.width / 2, canvas.height / 2 + 130);
                
                ctx.globalAlpha = 1;
            }
            
            // Journal — recent runs panel (small, right side)
            if (deathTimer > explosionDuration + 150) {
                const jAlpha = Math.min((deathTimer - explosionDuration - 150) / 40, 0.9);
                ctx.globalAlpha = jAlpha;
                const journal = loadJournal();
                const panelX = canvas.width - 320;
                const panelY = 80;
                const panelW = 300;
                const rowH = 22;
                const recentRuns = journal.runs.slice(0, 7);
                const panelH = 44 + recentRuns.length * rowH + 10;
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(panelX, panelY, panelW, panelH);
                ctx.strokeStyle = '#884444';
                ctx.lineWidth = 1.5;
                ctx.strokeRect(panelX, panelY, panelW, panelH);
                ctx.fillStyle = '#cc8888';
                ctx.font = 'bold 13px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'top';
                ctx.fillText('CODEX — RECENT RUNS', panelX + panelW / 2, panelY + 6);
                ctx.fillStyle = '#888888';
                ctx.font = '11px Arial';
                ctx.textAlign = 'left';
                ctx.fillText(`Total kills: ${journal.totalKills}  |  Extractions: ${journal.totalExtractions}`, panelX + 8, panelY + 24);
                for (let i = 0; i < recentRuns.length; i++) {
                    const r = recentRuns[i];
                    const ry = panelY + 44 + i * rowH;
                    ctx.fillStyle = r.extracted ? 'rgba(40,80,40,0.5)' : 'rgba(60,20,20,0.5)';
                    ctx.fillRect(panelX + 4, ry, panelW - 8, rowH - 2);
                    ctx.fillStyle = r.extracted ? '#88cc88' : '#cc6666';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(`${r.extracted ? '✓' : '✗'} ${r.level}  ·  D${r.danger}  ·  ${r.kills}k  ·  $${r.crumbs}`, panelX + 10, ry + rowH / 2);
                }
                ctx.globalAlpha = 1;
            }

            // Continue button - appears after stats finish counting
            if (deathTimer > explosionDuration + 240 && deathMoneyCount >= runMoneyEarned && deathKillsCount >= runEnemiesKilled) {
                const buttonAlpha = Math.min((deathTimer - explosionDuration - 240) / 30, 1);
                ctx.globalAlpha = buttonAlpha;
                
                const buttonWidth = 200;
                const buttonHeight = 50;
                const buttonX = canvas.width / 2 - buttonWidth / 2;
                const buttonY = canvas.height / 2 + 200;
                
                // Button background
                ctx.fillStyle = continueButtonHover ? '#00aa00' : '#008800';
                ctx.fillRect(buttonX, buttonY, buttonWidth, buttonHeight);
                
                // Button border
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 3;
                ctx.strokeRect(buttonX, buttonY, buttonWidth, buttonHeight);
                
                // Button text
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 24px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('CONTINUE', canvas.width / 2, buttonY + buttonHeight / 2);
                
                ctx.globalAlpha = 1;
            }
        }

        // Whether music is muted (persists via localStorage)
        let musicMuted = localStorage.getItem('mh_musicMuted') === 'true';

        function setMusicMute(muted) {
            musicMuted = muted;
            localStorage.setItem('mh_musicMuted', muted ? 'true' : 'false');
            if (ambientGain) {
                ambientGain.gain.setTargetAtTime(muted ? 0 : 0.18, audioContext.currentTime, 0.1);
            }
        }

        // Draw pause overlay
        function drawPauseOverlay() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Semi-transparent overlay
            ctx.fillStyle = 'rgba(0,0,0,0.78)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Panel background
            const pw = 460, ph = 380;
            const px = cx - pw / 2, py = cy - ph / 2;
            ctx.fillStyle = 'rgba(20,14,8,0.95)';
            ctx.strokeStyle = '#c8a060';
            ctx.lineWidth = 2;
            ctx.fillRect(px, py, pw, ph);
            ctx.strokeRect(px, py, pw, ph);

            // Title
            ctx.fillStyle = '#c8a060';
            ctx.font = 'bold 36px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            ctx.fillText('PAUSED', cx, py + 18);

            // Divider
            ctx.strokeStyle = '#8a6030';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(px + 20, py + 62); ctx.lineTo(px + pw - 20, py + 62);
            ctx.stroke();

            // Controls list
            const controls = [
                ['WASD',         'Move'],
                ['Left Click',   'Shoot'],
                ['Right Click',  'Melee'],
                ['Space',        'Dash'],
                ['1 / 2',        'Switch weapon slot'],
                ['G',            'Throw grenade'],
                ['E',            'Extract / Interact'],
                ['R',            'Reload'],
                ['Z / X / C / V','Active skills'],
                ['ESC',          'Pause / Resume'],
            ];

            ctx.font = '14px Arial';
            ctx.textBaseline = 'top';
            const rowH = 23;
            const colX = [px + 28, px + 180];
            for (let i = 0; i < controls.length; i++) {
                const ry = py + 74 + i * rowH;
                ctx.textAlign = 'left';
                ctx.fillStyle = '#d4b070';
                ctx.fillText(controls[i][0], colX[0], ry);
                ctx.fillStyle = '#e8dcc8';
                ctx.fillText(controls[i][1], colX[1], ry);
            }

            // Mute button
            const muteY = py + ph - 54;
            const muteW = 160, muteH = 34;
            const muteX = cx - muteW / 2;
            ctx.fillStyle = musicMuted ? '#553300' : '#224422';
            ctx.strokeStyle = musicMuted ? '#ff8844' : '#44cc66';
            ctx.lineWidth = 2;
            ctx.fillRect(muteX, muteY, muteW, muteH);
            ctx.strokeRect(muteX, muteY, muteW, muteH);
            ctx.fillStyle = musicMuted ? '#ffaa66' : '#88ee88';
            ctx.font = 'bold 15px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(musicMuted ? '♪ MUSIC: OFF' : '♪ MUSIC: ON', cx, muteY + muteH / 2);

            // Resume hint
            ctx.fillStyle = '#888877';
            ctx.font = '13px Arial';
            ctx.textBaseline = 'bottom';
            ctx.fillText('ESC to resume', cx, py + ph - 10);
        }

        // Draw background — warm house interior theme
        function drawBackground() {
            if (currentLevel === 2) {
                // === BASEMENT: dark concrete ===
                ctx.fillStyle = '#1e1e1e';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#4a4a4a';
                for (let zone of walkableZones) {
                    ctx.fillRect(zone.x - camera.x, zone.y - camera.y, zone.width, zone.height);
                }
                ctx.save();
                ctx.strokeStyle = '#383838';
                ctx.lineWidth = 1;
                ctx.globalAlpha = 0.7;
                for (let crack of levelCracks) {
                    ctx.beginPath();
                    ctx.moveTo(crack.x1 - camera.x, crack.y1 - camera.y);
                    ctx.lineTo(crack.x2 - camera.x, crack.y2 - camera.y);
                    ctx.stroke();
                }
                ctx.restore();
                // Water puddles (env hazards)
                ctx.save();
                ctx.globalAlpha = 0.4;
                ctx.fillStyle = '#5577aa';
                for (let h of envHazards.filter(h => h.type === 'puddle')) {
                    ctx.beginPath();
                    ctx.ellipse(h.x + h.width/2 - camera.x, h.y + h.height/2 - camera.y, h.width/2, h.height/2, 0, 0, Math.PI*2);
                    ctx.fill();
                    ctx.strokeStyle = '#7799cc'; ctx.lineWidth = 1.5; ctx.stroke();
                }
                ctx.restore();
                // Wire hazards (yellowish stripes)
                ctx.save();
                ctx.globalAlpha = 0.6;
                for (let h of envHazards.filter(h => h.type === 'wire')) {
                    ctx.fillStyle = '#ffcc00';
                    ctx.fillRect(h.x - camera.x, h.y - camera.y, h.width, h.height);
                }
                ctx.restore();
                const vg = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.25, canvas.width/2, canvas.height/2, canvas.width*0.75);
                vg.addColorStop(0, 'rgba(0,0,0,0)');
                vg.addColorStop(1, 'rgba(0,0,0,0.45)');
                ctx.fillStyle = vg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (currentLevel === 3) {
                // === ATTIC: dusty dim boards ===
                ctx.fillStyle = '#2a2018';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#5c4830';
                for (let zone of walkableZones) {
                    ctx.fillRect(zone.x - camera.x, zone.y - camera.y, zone.width, zone.height);
                }
                // Floor boards
                ctx.save();
                ctx.strokeStyle = '#4a3820';
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = 0.5;
                const boardW = 22;
                for (let zone of walkableZones) {
                    const zx = zone.x - camera.x;
                    const zy = zone.y - camera.y;
                    ctx.beginPath(); ctx.rect(zx, zy, zone.width, zone.height); ctx.clip();
                    for (let bx = zone.x - (zone.x % boardW); bx < zone.x + zone.width; bx += boardW) {
                        const sx = bx - camera.x;
                        ctx.beginPath();
                        ctx.moveTo(sx, zy);
                        ctx.lineTo(sx, zy + zone.height);
                        ctx.stroke();
                    }
                    ctx.restore(); ctx.save();
                    ctx.strokeStyle = '#4a3820'; ctx.lineWidth = 1.5; ctx.globalAlpha = 0.5;
                }
                ctx.restore();
                // Tape hazards (bright sticky strips)
                ctx.save();
                ctx.globalAlpha = 0.7;
                ctx.fillStyle = '#ffe080';
                for (let h of envHazards.filter(h => h.type === 'tape')) {
                    ctx.fillRect(h.x - camera.x, h.y - camera.y, h.width, h.height);
                }
                ctx.restore();
                // Cobwebs
                ctx.save();
                ctx.strokeStyle = 'rgba(200,200,180,0.25)';
                ctx.lineWidth = 0.8;
                for (let web of atticCobwebs) {
                    ctx.beginPath();
                    ctx.moveTo(web.x1 - camera.x, web.y1 - camera.y);
                    ctx.lineTo(web.x2 - camera.x, web.y2 - camera.y);
                    ctx.stroke();
                }
                ctx.restore();
                // Dust vignette (darker + amber tint at edges)
                const av = ctx.createRadialGradient(canvas.width/2, canvas.height/2, canvas.width*0.2, canvas.width/2, canvas.height/2, canvas.width*0.8);
                av.addColorStop(0, 'rgba(0,0,0,0)');
                av.addColorStop(1, 'rgba(0,0,0,0.6)');
                ctx.fillStyle = av;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (currentLevel === 4) {
                // === YARD: bright outdoor ===
                ctx.fillStyle = '#8fba5f';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                // Slightly lighter grass zones
                ctx.fillStyle = '#9eca6a';
                for (let zone of walkableZones) {
                    ctx.fillRect(zone.x - camera.x, zone.y - camera.y, zone.width, zone.height);
                }
                // Darker dirt patches (random but seeded by position)
                ctx.save();
                ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#7a5c30';
                for (let zone of walkableZones) {
                    for (let i = 0; i < 6; i++) {
                        const px = zone.x + ((zone.x * 17 + i * 113) % zone.width);
                        const py = zone.y + ((zone.y * 7  + i * 97)  % zone.height);
                        ctx.beginPath();
                        ctx.ellipse(px - camera.x, py - camera.y, 60 + (i*33)%80, 30 + (i*17)%50, (i*0.7), 0, Math.PI*2);
                        ctx.fill();
                    }
                }
                ctx.restore();
                // Garden bed hazards
                ctx.save();
                ctx.globalAlpha = 0.6;
                ctx.fillStyle = '#6b4820';
                for (let h of envHazards.filter(h => h.type === 'gardenBed')) {
                    ctx.fillRect(h.x - camera.x, h.y - camera.y, h.width, h.height);
                    ctx.strokeStyle = '#8b6830'; ctx.lineWidth = 2;
                    ctx.strokeRect(h.x - camera.x, h.y - camera.y, h.width, h.height);
                }
                ctx.restore();
                // Mud slow zones
                ctx.save();
                ctx.globalAlpha = 0.45;
                ctx.fillStyle = '#5a3c18';
                for (let h of envHazards.filter(h => h.type === 'mud')) {
                    ctx.beginPath();
                    ctx.ellipse(h.x + h.width/2 - camera.x, h.y + h.height/2 - camera.y, h.width/2, h.height/2, 0, 0, Math.PI*2);
                    ctx.fill();
                }
                ctx.restore();
                // Grass tufts
                ctx.save();
                ctx.strokeStyle = '#6a9e3a';
                ctx.lineWidth = 1.5;
                ctx.globalAlpha = 0.6;
                for (let t of yardGrassTufts) {
                    const tx = t.x - camera.x;
                    const ty = t.y - camera.y;
                    if (tx < -20 || tx > canvas.width + 20 || ty < -20 || ty > canvas.height + 20) continue;
                    for (let b = -1; b <= 1; b++) {
                        ctx.beginPath();
                        ctx.moveTo(tx, ty);
                        ctx.lineTo(tx + Math.cos(t.angle + b * 0.4) * t.size, ty - t.size * 1.2);
                        ctx.stroke();
                    }
                }
                ctx.restore();
            } else {
                // === HOUSE: warm wood floor ===
                ctx.fillStyle = '#f5f0e8';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#d4a96a';
                for (let zone of walkableZones) {
                    ctx.fillRect(zone.x - camera.x, zone.y - camera.y, zone.width, zone.height);
                }
                // Rug hazards (before wood grain so grain draws on top)
                ctx.save();
                ctx.globalAlpha = 0.55;
                const rugColors = ['#8844aa', '#aa4422', '#2244aa', '#44aa44'];
                let rugI = 0;
                for (let h of envHazards.filter(h => h.type === 'rug')) {
                    ctx.fillStyle = rugColors[rugI++ % rugColors.length];
                    ctx.fillRect(h.x - camera.x, h.y - camera.y, h.width, h.height);
                    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 6;
                    ctx.strokeRect(h.x - camera.x + 8, h.y - camera.y + 8, h.width - 16, h.height - 16);
                }
                ctx.restore();
                // Wood grain lines
                ctx.save();
                ctx.strokeStyle = '#c09050';
                ctx.lineWidth = 1;
                const grainSpacing = 18;
                for (let zone of walkableZones) {
                    const zx = zone.x - camera.x;
                    const zy = zone.y - camera.y;
                    ctx.beginPath();
                    ctx.rect(zx, zy, zone.width, zone.height);
                    ctx.clip();
                    for (let y = zone.y - (zone.y % grainSpacing); y < zone.y + zone.height + grainSpacing; y += grainSpacing) {
                        const sy = y - camera.y;
                        ctx.globalAlpha = 0.35;
                        ctx.beginPath();
                        ctx.moveTo(zx, sy + Math.sin(y * 0.03) * 1.5);
                        ctx.lineTo(zx + zone.width, sy + Math.sin((y + zone.width) * 0.03) * 1.5);
                        ctx.stroke();
                    }
                    ctx.restore();
                    ctx.save();
                    ctx.strokeStyle = '#c09050';
                    ctx.lineWidth = 1;
                }
                ctx.restore();
            }
        }

        // Draw env hazard overlays not covered in background (spray clouds, etc.)
        function drawEnvHazardOverlays() {
            for (let h of envHazards) {
                if (h.type !== 'spray') continue;
                const progress = h._sprayTimer ? h._sprayTimer / (activeRunEvent ? activeRunEvent.duration : 480) : 1;
                ctx.save();
                ctx.globalAlpha = 0.35 * Math.min(1, progress * 2);
                ctx.fillStyle = '#aaffaa';
                ctx.fillRect(h.x - camera.x, h.y - camera.y, h.width, h.height);
                // Drifting particles effect using pattern
                ctx.globalAlpha = 0.2;
                ctx.fillStyle = '#66cc66';
                for (let i = 0; i < 8; i++) {
                    const ox = ((Date.now() / 30 + i * 80) % h.width);
                    const oy = ((Date.now() / 50 + i * 60) % h.height);
                    ctx.beginPath();
                    ctx.arc(h.x - camera.x + ox, h.y - camera.y + oy, 12, 0, Math.PI * 2);
                    ctx.fill();
                }
                ctx.restore();
            }
        }

        // Draw obstacles — style depends on current level
        function drawObstacles() {
            for (let obstacle of obstacles) {
                const ox = obstacle.x - camera.x;
                const oy = obstacle.y - camera.y;
                const ow = obstacle.width;
                const oh = obstacle.height;
                // Shadow
                ctx.save(); ctx.globalAlpha = 0.45; ctx.fillStyle = '#000';
                ctx.fillRect(ox + 6, oy + 6, ow, oh); ctx.restore();
                if (currentLevel === 2) {
                    // Concrete/pipe style
                    ctx.fillStyle = '#5a5a5a';
                    ctx.fillRect(ox, oy, ow, oh);
                    ctx.strokeStyle = '#383838'; ctx.lineWidth = 2;
                    ctx.strokeRect(ox, oy, ow, oh);
                    if (oh >= 3 * ow || ow >= 3 * oh) {
                        ctx.save(); ctx.globalAlpha = 0.25; ctx.fillStyle = '#aaaaaa';
                        ctx.fillRect(ox + 2, oy + 2, ow * 0.3, oh - 4); ctx.restore();
                    }
                } else if (currentLevel === 3) {
                    // Attic: wooden trunks/beams
                    const isBeam = (ow >= 400 || oh >= 400);
                    ctx.fillStyle = isBeam ? '#3d2810' : '#6b4c2a';
                    ctx.fillRect(ox, oy, ow, oh);
                    ctx.strokeStyle = '#2a1c08'; ctx.lineWidth = isBeam ? 3 : 2;
                    ctx.strokeRect(ox, oy, ow, oh);
                    if (!isBeam) {
                        // Metal clasp on trunks
                        ctx.save(); ctx.fillStyle = '#888888';
                        ctx.fillRect(ox + ow/2 - 8, oy + oh/2 - 5, 16, 10); ctx.restore();
                    }
                    // Beam highlight streak
                    if (isBeam) {
                        ctx.save(); ctx.globalAlpha = 0.15; ctx.fillStyle = '#c09060';
                        ctx.fillRect(ox + 3, oy + 3, ow > oh ? ow - 6 : 8, oh > ow ? oh - 6 : 8); ctx.restore();
                    }
                } else if (currentLevel === 4) {
                    // Yard: rocks, pots, hedge, fence
                    const isHedge = ow >= 400;
                    const isFence = oh <= 35;
                    if (isFence) {
                        // Fence — dark brown bars
                        ctx.fillStyle = '#5c3a18';
                        ctx.fillRect(ox, oy, ow, oh);
                        ctx.strokeStyle = '#3a2008'; ctx.lineWidth = 2;
                        ctx.strokeRect(ox, oy, ow, oh);
                        const postSpacing = 60;
                        for (let px = ox; px < ox + ow; px += postSpacing) {
                            ctx.fillStyle = '#4a2c0c';
                            ctx.fillRect(px - 3, oy - 8, 8, oh + 16);
                        }
                    } else if (isHedge) {
                        // Hedge — dark green bumpy
                        ctx.fillStyle = '#2d6020';
                        ctx.fillRect(ox, oy, ow, oh);
                        ctx.save(); ctx.strokeStyle = '#1a4010'; ctx.lineWidth = 1.5;
                        for (let bx = ox; bx < ox + ow; bx += 16) {
                            ctx.beginPath();
                            ctx.arc(bx + 8, oy + oh/2, 10, 0, Math.PI*2); ctx.stroke();
                        }
                        ctx.restore();
                    } else if (ow < 130 && oh < 130 && Math.abs(ow - oh) < 30) {
                        // Round rock/pot — draw as irregular oval
                        ctx.fillStyle = ow < 95 ? '#8a7860' : '#7a9050'; // rock vs pot
                        ctx.beginPath();
                        ctx.ellipse(ox + ow/2, oy + oh/2, ow/2, oh/2, 0.3, 0, Math.PI*2);
                        ctx.fill();
                        ctx.strokeStyle = '#5a5040'; ctx.lineWidth = 2; ctx.stroke();
                    } else {
                        // Garden tool (stick-shaped)
                        ctx.fillStyle = '#8b5e2a';
                        ctx.fillRect(ox, oy, ow, oh);
                        ctx.strokeStyle = '#5a3a10'; ctx.lineWidth = 2;
                        ctx.strokeRect(ox, oy, ow, oh);
                    }
                } else {
                    // House: black walls for 3D shadow effect
                    ctx.fillStyle = '#000000';
                    ctx.fillRect(ox, oy, ow, oh);
                    ctx.save(); ctx.strokeStyle = '#000000'; ctx.lineWidth = 2;
                    ctx.strokeRect(ox, oy, ow, oh);
                    ctx.restore();
                }
            }
        }

        // Full-screen tactical map (opened with M)
        function drawFullMap() {
            const PAD = 50;
            const MW = canvas.width - PAD * 2;
            const MH = canvas.height - PAD * 2;
            const SX = PAD, SY = PAD;
            const sx = v => SX + v * (MW / mapWidth);
            const sy = v => SY + v * (MH / mapHeight);
            const sw = v => v * (MW / mapWidth);
            const sh = v => v * (MH / mapHeight);

            // Background overlay
            ctx.fillStyle = 'rgba(0, 0, 0, 0.88)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Map border
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 1;
            ctx.strokeRect(SX, SY, MW, MH);

            // Walkable zones (floor)
            const floorColor = { 1:'rgba(55,45,40,0.95)', 2:'rgba(28,35,52,0.95)', 3:'rgba(52,45,34,0.95)', 4:'rgba(28,52,24,0.95)' }[currentLevel] || 'rgba(45,45,45,0.95)';
            ctx.fillStyle = floorColor;
            for (const z of walkableZones) {
                ctx.fillRect(sx(z.x), sy(z.y), sw(z.width), sh(z.height));
            }

            // Obstacles (dark silhouettes)
            ctx.fillStyle = 'rgba(0,0,0,0.65)';
            for (const o of obstacles) {
                ctx.fillRect(sx(o.x), sy(o.y), Math.max(2, sw(o.width)), Math.max(2, sh(o.height)));
            }

            // Hazard tints
            for (const h of envHazards) {
                const hc = {
                    rug:'rgba(180,80,80,0.3)', puddle:'rgba(60,100,200,0.3)', tape:'rgba(220,190,50,0.35)',
                    mud:'rgba(110,70,28,0.35)', wire:'rgba(255,120,0,0.4)', gardenBed:'rgba(40,170,40,0.3)'
                }[h.type] || 'rgba(200,200,100,0.2)';
                ctx.fillStyle = hc;
                ctx.fillRect(sx(h.x), sy(h.y), sw(h.width), sh(h.height));
            }

            // Extraction door — pulsing green dot + label
            if (extractDoor) {
                const edX = sx(extractDoor.x + extractDoor.width / 2);
                const edY = sy(extractDoor.y + extractDoor.height / 2);
                const pulse = 0.55 + 0.45 * Math.sin(gameTime * 0.08);
                ctx.fillStyle = `rgba(0,255,100,${pulse.toFixed(2)})`;
                ctx.shadowColor = '#00ff66';
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.arc(edX, edY, 7, 0, Math.PI * 2);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = 'rgba(0,255,100,0.9)';
                ctx.font = '10px monospace';
                ctx.textAlign = 'left';
                ctx.textBaseline = 'middle';
                ctx.fillText('BURROW', edX + 10, edY);
                // Dashed route line from player to burrow
                const pMapX = sx(player.x + player.width / 2);
                const pMapY = sy(player.y + player.height / 2);
                ctx.strokeStyle = 'rgba(0,255,100,0.25)';
                ctx.lineWidth = 1;
                ctx.setLineDash([5, 4]);
                ctx.beginPath(); ctx.moveTo(pMapX, pMapY); ctx.lineTo(edX, edY); ctx.stroke();
                ctx.setLineDash([]);
            }

            // Enemies — red dots
            ctx.fillStyle = 'rgba(230,55,55,0.85)';
            for (const e of enemies) {
                ctx.beginPath();
                ctx.arc(sx(e.x + (e.width||20)/2), sy(e.y + (e.height||20)/2), 2.5, 0, Math.PI * 2);
                ctx.fill();
            }

            // Player — white glowing dot + aim direction
            const pMapX = sx(player.x + player.width / 2);
            const pMapY = sy(player.y + player.height / 2);
            ctx.fillStyle = '#ffffff';
            ctx.shadowColor = '#ffffff';
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.arc(pMapX, pMapY, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
            // Aim direction tick
            const aimAngle = Math.atan2(
                (mousePosition.y + camera.y) - (player.y + player.height / 2),
                (mousePosition.x + camera.x) - (player.x + player.width / 2)
            );
            ctx.strokeStyle = 'rgba(255,255,255,0.55)';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(pMapX, pMapY);
            ctx.lineTo(pMapX + Math.cos(aimAngle) * 13, pMapY + Math.sin(aimAngle) * 13);
            ctx.stroke();

            // Title
            const _lvlNames = { 1:'THE HOUSE', 2:'BASEMENT', 3:'ATTIC', 4:'THE YARD' };
            ctx.fillStyle = 'rgba(255,255,255,0.75)';
            ctx.font = 'bold 13px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'alphabetic';
            ctx.fillText((_lvlNames[currentLevel] || `LEVEL ${currentLevel}`) + '  —  TACTICAL MAP', canvas.width / 2, SY - 14);

            // Close hint
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.font = '11px monospace';
            ctx.fillText('[M] or [ESC]  close map', canvas.width / 2, canvas.height - 14);

            // Legend (bottom-left)
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            const legendItems = [
                { color: '#ffffff',            label: 'YOU'     },
                { color: 'rgba(0,255,100,0.9)',label: 'BURROW'  },
                { color: 'rgba(230,55,55,0.9)',label: 'ENEMIES' }
            ];
            for (let i = 0; i < legendItems.length; i++) {
                const ly = SY + MH - 44 + i * 16;
                ctx.fillStyle = legendItems[i].color;
                ctx.beginPath(); ctx.arc(SX + 8, ly, 4, 0, Math.PI * 2); ctx.fill();
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.font = '10px monospace';
                ctx.fillText(legendItems[i].label, SX + 18, ly);
            }
        }

        // Game loop
        function gameLoop() {
            gameTime++;
            if (muzzleFlashTimer > 0) muzzleFlashTimer--;
            if (gameState === 'death') {
                updateDeathScreen();
                drawDeathScreen();
            } else if (gameState === 'extracted') {
                // Draw the game world frozen behind the overlay
                const shakeOffset = { x: 0, y: 0 };
                ctx.save();
                ctx.translate(shakeOffset.x, shakeOffset.y);
                drawBackground();
                drawEnvHazardOverlays();
                drawBullets();
                drawParticles();
                drawCoins();
                drawEnemies();
                drawExtractDoor();
                drawObstacles();
                ctx.restore();
                drawDifficultyBar();
                drawHealthBar();
                drawWeaponHUD();
                updateExtractionScreen();
                drawExtractionScreen();
            } else if (gameState === 'playing') {
                const shakeOffset = updateScreenShake();

                ctx.save();
                ctx.globalAlpha = 1; // Ensure alpha is reset
                ctx.translate(shakeOffset.x, shakeOffset.y);
                drawBackground();
                drawLightingEffect();
                
                if (!isPaused && !mapOpen) {
                    updatePlayer();
                    updateBullets();
                    updateEnemyBullets();
                    updateHitscanEffects();
                    updateParticles();
                    updateNoise();
                    updateDifficulty();
                    spawnEnemies();
                    updateEnemies();
                    updateCoins();
                    updateHealingItems();
                    updateGrenades();
                    updateExtractDoor();
                    updateRunEvent();
                }
                
                drawEnvHazardOverlays();
                drawPlayer();
                drawBullets();
                drawEnemyBullets();
                drawHitscanEffects();
                drawParticles();
                drawCoins();
                drawHealingItems();
                drawGrenades();
                drawEnemies();
                drawExtractDoor();

                // Draw obstacles on top so they're always visible
                drawObstacles();

                ctx.restore();
                
                drawDifficultyBar();
                drawMoneyCounter();
                drawHealthBar();
                drawWeaponHUD();
                drawGrenadeHUD();
                drawSkillHUD();
                drawBurrowArrow();
                drawRunEventBanner();

                // Moth blind overlay
                if (playerBlindTimer > 0) {
                    ctx.save();
                    ctx.globalAlpha = Math.min(0.75, playerBlindTimer / 60 * 0.75);
                    ctx.fillStyle = '#888888';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.restore();
                }
                // Level label (top-right corner)
                const _lvlLabelColors = { 1: '#c8a060', 2: '#7799cc', 3: '#cc9966', 4: '#88cc44' };
                const _lvlLabelNames = { 1: 'THE HOUSE', 2: 'BASEMENT', 3: 'ATTIC', 4: 'THE YARD' };
                ctx.fillStyle = _lvlLabelColors[currentLevel] || '#ffffff';
                ctx.font = 'bold 11px Arial';
                ctx.textAlign = 'right';
                ctx.textBaseline = 'top';
                ctx.fillText(_lvlLabelNames[currentLevel] || `LEVEL ${currentLevel}`, canvas.width - 10, 10);

                if (isPaused) {
                    drawPauseOverlay();
                }
                if (mapOpen) {
                    drawFullMap();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        resetRunState();

        // Start game
        gameLoop();
    </script>
</body>
</html>
