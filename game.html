            });
        }

        function isEliteEnemy(enemy) {
            return !!enemy && enemy.isElite === true;
        }

        function getEnemyDamageAmount(enemy, rawDamage) {
            if (!enemy) return rawDamage;
            const damage = Math.max(0, rawDamage || 0);
            return isEliteEnemy(enemy) ? damage * 0.5 : damage;
        }

        function applyDamageToEnemy(enemy, rawDamage) {
            const amount = getEnemyDamageAmount(enemy, rawDamage);
            enemy.health -= amount;
            return amount;
        }

        function triggerPlayerDeath() {
            for (let i = 0; i < 30; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x: player.x + player.width / 2,
                    y: player.y + player.height / 2,
                    velocityX: Math.cos(angle) * speed,
                    velocityY: Math.sin(angle) * speed,
                    life: 60,
                    maxLife: 60,
                    size: 4 + Math.random() * 4,
                    color: Math.random() > 0.5 ? '#ff0000' : '#ff6600'
                });
            }
            
            // All run crumbs lost on death — banked crumbs in localStorage are untouched
            deathMoneyPenalty = Math.floor(money);
            money = 0;
            
            recordRunToJournal(false);
            stopAmbientMusic();
            gameState = 'death';
            deathTimer = 0;
            deathMoneyCount = 0;
            deathKillsCount = 0;
        }

        function applyBurnToEnemy(enemy, damagePerTick, durationFrames) {
            if (!enemy) return;
            enemy.burnTimer = Math.max(enemy.burnTimer || 0, durationFrames || 0);
            enemy.burnDamage = Math.max(enemy.burnDamage || 0, damagePerTick || 1);
            if (!enemy.burnTickTimer) enemy.burnTickTimer = 18;
        }

        function applyBurnToPlayer(damagePerTick, durationFrames) {
            player.burnTimer = Math.max(player.burnTimer, durationFrames || 0);
            const normalizedBurnDamage = Math.max(1, Math.round(damagePerTick || 0));
            player.burnTickDamage = Math.max(player.burnTickDamage, normalizedBurnDamage);
            if (player.burnTickTimer <= 0) {
                player.burnTickTimer = 18;
            }
            player.burnVisualTimer = Math.max(player.burnVisualTimer, durationFrames || 0);
        }

        function activateSkill(id, def) {
            activeSkillCooldowns[id] = def.cooldown;
            if (id === 'smokeCloak') { smokeCloakTimer = 240; }
            if (id === 'frenzy') { frenzyTimer = 300; }
            if (id === 'shieldBubble') { shieldBubbleHits = 3; }
            if (id === 'rally') {
                player.health = Math.min(player.maxHealth, player.health + 25);
                createHealEffect(player.x + player.width / 2, player.y + player.height / 2);
            }
            playSkillSound(id);
        }

        function createHealEffect(x, y) {
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const speed = 2 + Math.random() * 2;
                particles.push({
                    x: x, y: y,
                    velocityX: Math.cos(angle) * speed,
                    velocityY: Math.sin(angle) * speed,
                    life: 20, maxLife: 20,
                    size: 3 + Math.random() * 2,
                    color: '#88ff88'
                });
            }
        }

        function playSkillSound(id) {
            if (!audioContext) return;
            const now = audioContext.currentTime;
            const gain = audioContext.createGain();
            gain.gain.setValueAtTime(0.25, now);
            gain.gain.exponentialRampToValueAtTime(0.0001, now + 0.4);
            const osc = audioContext.createOscillator();
            if (id === 'smokeCloak') { osc.type = 'sine'; osc.frequency.setValueAtTime(300, now); osc.frequency.exponentialRampToValueAtTime(100, now + 0.3); }
            else if (id === 'frenzy') { osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, now); osc.frequency.exponentialRampToValueAtTime(800, now + 0.2); }
            else if (id === 'shieldBubble') { osc.type = 'sine'; osc.frequency.setValueAtTime(800, now); osc.frequency.exponentialRampToValueAtTime(1200, now + 0.2); }
            else if (id === 'rally') { osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); osc.frequency.exponentialRampToValueAtTime(660, now + 0.3); }
            osc.connect(gain); gain.connect(audioContext.destination);
            osc.start(now); osc.stop(now + 0.4);
        }

        function throwGrenade() {
            if (grenadeCount <= 0 || weaponSwapCooldown > 0) return;
            grenadeCount--;
            const px = player.x + player.width / 2;
            const py = player.y + player.height / 2;
            const mx = mousePosition.x + camera.x;
            const my = mousePosition.y + camera.y;
            const dx = mx - px;
            const dy = my - py;
            const dist = Math.hypot(dx, dy) || 1;
            const speed = 8;
            const travelFrames = 30; // ~0.5s at 60fps
            flyingGrenades.push({
                x: px,
                y: py,
                vx: (dx / dist) * speed,
                vy: (dy / dist) * speed,
                type: equippedGrenadeType,
                frames: travelFrames,
                maxFrames: travelFrames
            });
        }

        function updateGrenades() {
            // Update flying grenades
            for (let i = flyingGrenades.length - 1; i >= 0; i--) {
                const g = flyingGrenades[i];
                g.x += g.vx;
                g.y += g.vy;
                g.frames--;
                if (g.frames <= 0) {
                    // Land and create zone
                    const gType = grenadeTypes[g.type];
                    activeGrenadeZones.push({
                        x: g.x,
                        y: g.y,
                        type: g.type,
                        radius: gType.radius,
                        life: gType.duration,
                        maxLife: gType.duration,
                        tickTimer: 0
                    });
                    flyingGrenades.splice(i, 1);
                }
            }

            // Update active zones
            for (let i = activeGrenadeZones.length - 1; i >= 0; i--) {
                const z = activeGrenadeZones[i];
                z.life--;
                z.tickTimer++;

                const gType = grenadeTypes[z.type];
                const px = player.x + player.width / 2;
                const py = player.y + player.height / 2;
                const playerInZone = Math.hypot(px - z.x, py - z.y) < z.radius;

                if (z.type === 'fire') {
                    if (z.tickTimer >= gType.tickRate) {
                        z.tickTimer = 0;
                        if (playerInZone) {
                            applyPlayerDamage(gType.tickDamage);
                        }
                        for (let enemy of enemies) {
                            const ex = enemy.x + enemy.width / 2;
                            const ey = enemy.y + enemy.height / 2;
                            if (Math.hypot(ex - z.x, ey - z.y) < z.radius) {
                                applyDamageToEnemy(enemy, gType.tickDamage);
                                enemy.hitTimer = 6;
                            }
                        }
                    }
                } else if (z.type === 'heal') {
                    if (z.tickTimer >= gType.tickRate) {
                        z.tickTimer = 0;
                        if (playerInZone) {
                            player.health = Math.min(player.maxHealth, player.health + gType.healPerTick);
                        }
                    }
                }

                if (z.life <= 0) {
                    activeGrenadeZones.splice(i, 1);
                }
            }

            // Apply ice slow and smoke blind to enemies each frame
            for (let enemy of enemies) {
                enemy.iceSlow = 1;
                enemy.smokeBlind = false;
            }
            for (let z of activeGrenadeZones) {
                if (z.type === 'ice') {
                    const gType = grenadeTypes['ice'];
                    for (let enemy of enemies) {
                        const ex = enemy.x + enemy.width / 2;
                        const ey = enemy.y + enemy.height / 2;
                        if (Math.hypot(ex - z.x, ey - z.y) < z.radius) {
                            enemy.iceSlow = gType.slowFactor;
                        }
                    }
                } else if (z.type === 'smoke') {
                    for (let enemy of enemies) {
                        const ex = enemy.x + enemy.width / 2;
                        const ey = enemy.y + enemy.height / 2;
                        if (Math.hypot(ex - z.x, ey - z.y) < z.radius) {
                            enemy.smokeBlind = true;
                        }
                    }
                }
            }
        }

        function drawGrenades() {
            const t = performance.now() * 0.003;
            // Draw zones
            for (let z of activeGrenadeZones) {
                const gType = grenadeTypes[z.type];
                const lifeRatio = z.life / z.maxLife;
                const sx = z.x - camera.x;
                const sy = z.y - camera.y;

                ctx.save();
                if (z.type === 'smoke') {
                    ctx.globalAlpha = 0.18 * lifeRatio;
                    ctx.fillStyle = gType.color;
                    ctx.beginPath();
                    ctx.arc(sx, sy, z.radius, 0, Math.PI * 2);
                    ctx.fill();
                } else if (z.type === 'fire') {
                    ctx.globalAlpha = 0.28 * lifeRatio;
                    ctx.fillStyle = gType.color;
                    ctx.beginPath();
                    ctx.arc(sx, sy, z.radius, 0, Math.PI * 2);
                    ctx.fill();
                    // Flickering edge particles drawn as small arcs
                    ctx.globalAlpha = 0.5 * lifeRatio;
                    ctx.strokeStyle = '#ff2200';
                    ctx.lineWidth = 3;
                    for (let f = 0; f < 8; f++) {
                        const fa = (f / 8) * Math.PI * 2 + t;
                        const fr = z.radius * (0.85 + 0.15 * Math.sin(t * 3 + f));
                        ctx.beginPath();
                        ctx.arc(sx + Math.cos(fa) * fr, sy + Math.sin(fa) * fr, 4, 0, Math.PI * 2);
                        ctx.stroke();
                    }
                } else if (z.type === 'ice') {
                    ctx.globalAlpha = 0.22 * lifeRatio;
                    ctx.fillStyle = gType.color;
                    ctx.beginPath();
                    ctx.arc(sx, sy, z.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 0.4 * lifeRatio;
                    ctx.strokeStyle = '#aaeeff';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(sx, sy, z.radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else if (z.type === 'heal') {
                    const pulse = 0.15 + 0.1 * Math.sin(t * 4);
                    ctx.globalAlpha = pulse * lifeRatio;
                    ctx.fillStyle = gType.color;
                    ctx.beginPath();
                    ctx.arc(sx, sy, z.radius, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.globalAlpha = 0.5 * lifeRatio;
                    ctx.strokeStyle = '#44ff44';
                    ctx.lineWidth = 3;
                    ctx.beginPath();
                    ctx.arc(sx, sy, z.radius * (0.9 + 0.1 * Math.sin(t * 4)), 0, Math.PI * 2);
                    ctx.stroke();
                }
                ctx.restore();
            }

            // Draw flying grenades
            for (let g of flyingGrenades) {
                const gType = grenadeTypes[g.type];
                ctx.save();
                ctx.fillStyle = gType.color;
                ctx.globalAlpha = 0.9;
                ctx.beginPath();
                ctx.arc(g.x - camera.x, g.y - camera.y, 5, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function applyPlayerDamage(amount) {
            if (player.invulnerable) return;
            // Shield bubble absorbs hit
            if (shieldBubbleHits > 0) {
                shieldBubbleHits--;
                // Cyan spark particles
                createHitEffect(player.x + player.width / 2, player.y + player.height / 2, '#00ffff');
                player.invulnerable = true; player.invulnerableTime = 20;
                return;
            }
            const normalizedDamage = Math.max(1, Math.round(amount || 0));
            player.health -= normalizedDamage;
            player.health = Math.max(0, Math.floor(player.health));
            player.invulnerable = true;
            player.invulnerableTime = 30;
            player.hitTimer = 10;
            addScreenShake(10, 18);
            createHitEffect(player.x + player.width / 2, player.y + player.height / 2, '#ffffff');
            playHitSound(0);

            if (player.health <= 0) {
                triggerPlayerDeath();
            }
        }

        function getEnemyTarget(enemy) {
            const enemyCenterX = enemy.x + enemy.width / 2;
            const enemyCenterY = enemy.y + enemy.height / 2;

            let bestTarget = null;
            let bestDistance = Infinity;

            for (let other of enemies) {
                if (other === enemy || other.faction === enemy.faction || isEliteEnemy(other)) continue;
                const otherCenterX = other.x + other.width / 2;
                const otherCenterY = other.y + other.height / 2;
                const dist = Math.hypot(otherCenterX - enemyCenterX, otherCenterY - enemyCenterY);
                if (dist > enemyTargetRange) {
                    continue;
                }
                if (dist < bestDistance) {
                    bestDistance = dist;
                    bestTarget = { type: 'enemy', enemy: other, x: otherCenterX, y: otherCenterY, distance: dist };
                }
            }

            return bestTarget;
        }
        function getRandomWalkablePosition(entityWidth, entityHeight) {
            for (let i = 0; i < 100; i++) {
                const zone = walkableZones[Math.floor(Math.random() * walkableZones.length)];
                const maxX = zone.x + zone.width - entityWidth;
                const maxY = zone.y + zone.height - entityHeight;
                if (maxX <= zone.x || maxY <= zone.y) {
                    continue;
                }

                const x = zone.x + Math.random() * (maxX - zone.x);
                const y = zone.y + Math.random() * (maxY - zone.y);

                if (!checkObstacleCollision(x, y, entityWidth, entityHeight)) {
                    return { x, y };
                }
            }

            return {
                x: clamp(player.x + (Math.random() - 0.5) * 240, 0, mapWidth - entityWidth),
                y: clamp(player.y + (Math.random() - 0.5) * 240, 0, mapHeight - entityHeight)
            };
        }

        function getSpawnPointOffscreen(entityWidth, entityHeight) {
            const padding = 80;
            const viewX = camera.x - padding;
            const viewY = camera.y - padding;
            const viewW = canvas.width + padding * 2;
            const viewH = canvas.height + padding * 2;

            for (let i = 0; i < 80; i++) {
                const candidate = getRandomWalkablePosition(entityWidth, entityHeight);
                const x = candidate.x;
                const y = candidate.y;

                const inView = rectsIntersect(x, y, entityWidth, entityHeight, viewX, viewY, viewW, viewH);
                if (inView) continue;
                if (checkObstacleCollision(x, y, entityWidth, entityHeight)) continue;

                return { x, y };
            }

            // Fallback: any valid walkable spot
            return getRandomWalkablePosition(entityWidth, entityHeight);
        }

        function getAvailableEnemyTypes() {
            return Object.entries(enemyTypeDefs).filter(([id, def]) =>
                !def.isElite && def.spawnMinDiff <= difficulty
            );
        }

        function spawnEnemyOfType(typeId, x, y) {
            const def = enemyTypeDefs[typeId];
            if (!def) return null;
            const weaponId = def.weaponPool ? def.weaponPool[Math.floor(Math.random() * def.weaponPool.length)] : null;
            const weaponConfig = weaponId ? (enemyWeaponConfigs[weaponId] || null) : null;
            const ammoProfile = getEnemyAmmoProfile(weaponId);
            const size = Math.round(36 * (def.scale || 1));
            return {
                x, y, width: size, height: size,
                enemyType: typeId,
                speed: def.speed + difficulty * 0.04,
                health: def.hp + Math.floor(difficulty * 0.8),
                maxHealth: def.hp + Math.floor(difficulty * 0.8),
                faction: def.faction,
                color: def.faction === 99 ? eliteColor : (def.faction === 0 ? '#4a2800' : (def.faction === 1 ? '#aaaaaa' : '#5c3d1a')),
                weaponId,
                variant: def.meleeFighter ? 'melee' : 'ranged',
                meleeDamage: def.meleeFighter ? 14 : 8,
                behavior: def.meleeFighter ? 'melee' : 'shoot',
                behaviorTimer: 90 + Math.floor(Math.random() * 60),
                coverPoint: null, coverAction: 'cover', peekPoint: null, coverRecalcTimer: 0,
                shootCooldown: weaponConfig ? Math.floor(Math.random() * (weaponConfig.fireCooldownFrames || 60)) : 0,
                reloadTimer: 0, reloadDuration: ammoProfile.reloadFrames,
                ammo: ammoProfile.maxAmmo, maxAmmo: ammoProfile.maxAmmo,
                alertTimer: def.isElite ? 300 : 0,
                alertTargetX: 0, alertTargetY: 0,
                facingAngle: Math.random() * Math.PI * 2, desiredFacingAngle: 0,
                lookOffset: Math.random() * Math.PI * 2,
                lastSeenTimer: 0, lastSeenX: 0, lastSeenY: 0,
                wanderOffsetX: (Math.random()-0.5)*140, wanderOffsetY: (Math.random()-0.5)*140,
                hitTimer: 0, wallFollowDirX: 0, wallFollowDirY: 0, wallFollowTimer: 0,
                isElite: !!def.isElite, eliteType: def.eliteType || null,
                sniperWarningTimer: 0, sniperTargetX: 0, sniperTargetY: 0,
                flying: !!def.flying,
                hasShield: !!def.hasShield,
                buffsNearby: !!def.buffsNearby, buffTimer: 0,
                poisonSpit: !!def.poisonSpit,
                swarmer: !!def.swarmer,
                blindsPlayer: !!def.blindsPlayer,
                segmented: !!def.segmented,
                drawFn: def.drawFn,
                scale: def.scale || 1,
                coinRange: def.coinRange || [2,5]
            };
        }

        // Spawn enemies based on difficulty
        function spawnEnemies() {
            spawnTimer--;
            const spawnRate = Math.max(60, 200 - (difficulty * 8));
            if (spawnTimer > 0) return;
            spawnTimer = spawnRate;

            const available = getAvailableEnemyTypes();
            if (available.length === 0) return;

            const groupCount = difficulty >= 8 ? 3 : 2;

            for (let g = 0; g < groupCount; g++) {
                // Build weighted list
                const weights = available.map(([id, def]) => {
                    if (['houseRoach', 'rivalMouse', 'ratScout'].includes(id)) return 4;
                    if (def.spawnMinDiff >= difficulty - 1) return 1;
                    return 2;
                });
                const totalWeight = weights.reduce((a, b) => a + b, 0);
                let r = Math.random() * totalWeight;
                let chosenId = available[0][0];
                for (let i = 0; i < available.length; i++) {
                    r -= weights[i];
                    if (r <= 0) { chosenId = available[i][0]; break; }
                }

                const def = enemyTypeDefs[chosenId];
                const groupSize = Math.min(2 + Math.floor(difficulty / 3), def.swarmer ? 6 : 4);
                const size = Math.round(36 * (def.scale || 1));
                const groupSpawn = getSpawnPointOffscreen(size, size);

                for (let i = 0; i < groupSize; i++) {
                    const spread = def.swarmer ? 100 : 70;
                    const x = clamp(groupSpawn.x + (Math.random() - 0.5) * spread, 0, mapWidth - size);
                    const y = clamp(groupSpawn.y + (Math.random() - 0.5) * spread, 0, mapHeight - size);
                    if (!def.flying && (checkObstacleCollision(x, y, size, size) || !isRectInWalkableArea(x, y, size, size))) continue;
                    const e = spawnEnemyOfType(chosenId, x, y);
                    if (e) enemies.push(e);
                }
            }

            // Elite spawn at difficulty 4+
            if (difficulty >= 4 && Math.random() < 0.18) {
                const eliteTypes = ['eliteFlame', 'eliteMinigun', 'eliteSniper'];
                const eliteId = eliteTypes[Math.floor(Math.random() * eliteTypes.length)];
                const eliteCount = Math.min(1 + Math.floor((difficulty - 4) / 6), 3);
                const eliteSpawn = getSpawnPointOffscreen(46, 46);

                for (let e = 0; e < eliteCount; e++) {
                    const x = clamp(eliteSpawn.x + (Math.random() - 0.5) * 70, 0, mapWidth - 46);
                    const y = clamp(eliteSpawn.y + (Math.random() - 0.5) * 70, 0, mapHeight - 46);
                    if (checkObstacleCollision(x, y, 46, 46) || !isRectInWalkableArea(x, y, 46, 46)) continue;
                    const elite = spawnEnemyOfType(eliteId, x, y);
                    if (elite) enemies.push(elite);
                }
            }
        }

        // Update enemies
        function updateEnemies() {
            for (let f = 0; f < factionWander.length; f++) {
                const wander = factionWander[f];
                if (wander.timer > 0) {
                    wander.timer--;
                }
                if (wander.timer <= 0) {
                    const spot = getRandomWalkablePosition(40, 40);
                    wander.x = spot.x;
                    wander.y = spot.y;
                    wander.timer = 360 + Math.floor(Math.random() * 420);
                }
            }

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const enemyIsElite = enemy.isElite === true;
                const centerX = enemy.x + enemy.width / 2;
                const centerY = enemy.y + enemy.height / 2;
                if (!Number.isFinite(enemy.facingAngle)) {
                    enemy.facingAngle = 0;
                }
                if (!Number.isFinite(enemy.desiredFacingAngle)) {
                    enemy.desiredFacingAngle = enemy.facingAngle;
                }
                if (!Number.isFinite(enemy.alertTargetX)) {
                    enemy.alertTargetX = centerX;
                }
                if (!Number.isFinite(enemy.alertTargetY)) {
                    enemy.alertTargetY = centerY;
                }
                const playerCenterX = player.x + player.width / 2;
                const playerCenterY = player.y + player.height / 2;
                // Smoke grenade blocks enemy vision of player
                const smokedBlind = !!enemy.smokeBlind;
                const canSeePlayer = !smokedBlind && canEnemySeeTarget(enemy, playerCenterX, playerCenterY);
                // Ice grenade/cryo round slows enemy
                if (enemy.iceSlowTimer > 0) {
                    enemy.iceSlowTimer--;
                    if (enemy.iceSlowTimer <= 0) enemy.iceSlow = undefined;
                }
                // Commander buff timer
                if (enemy.commanderBuff > 0) enemy.commanderBuff--;
                const effectiveSpeed = enemy.speed * (enemy.iceSlow !== undefined ? enemy.iceSlow : 1) * (enemy.commanderBuff > 0 ? 1.2 : 1);
                const isMelee = enemy.variant === 'melee';
                const enemyTarget = isMelee ? null : getEnemyTarget(enemy);
                const hasEnemyTarget = !!enemyTarget;

                if (canSeePlayer) {
                    enemy.lastSeenTimer = 200;
                    enemy.lastSeenX = playerCenterX;
                    enemy.lastSeenY = playerCenterY;
                }

                if (!canSeePlayer && !hasEnemyTarget && noise.value > 0) {
                    const noiseRadius = noise.baseRadius + noise.value * noise.maxRadius;
                    const distToNoise = Math.hypot(noise.x - centerX, noise.y - centerY);
                    if (distToNoise <= noiseRadius) {
                        enemy.alertTimer = 240;
                        enemy.alertTargetX = noise.x;
                        enemy.alertTargetY = noise.y;
                    }
                }

                if (enemy.alertTimer > 0) {
                    enemy.alertTimer--;
                }
                if (enemy.lastSeenTimer > 0) {
                    enemy.lastSeenTimer--;
                }
                if (!enemyIsElite && enemy.reloadTimer > 0) {
                    enemy.reloadTimer--;
                    if (enemy.reloadTimer <= 0) {
                        enemy.ammo = enemy.maxAmmo || 0;
                    }
                }

                let target;
                if (canSeePlayer) {
                    target = { type: 'player', x: playerCenterX, y: playerCenterY, distance: Math.hypot(playerCenterX - centerX, playerCenterY - centerY) };
                } else if (enemy.lastSeenTimer > 0) {
                    target = { type: 'memory', x: enemy.lastSeenX, y: enemy.lastSeenY, distance: Math.hypot(enemy.lastSeenX - centerX, enemy.lastSeenY - centerY) };
                } else if (hasEnemyTarget) {
                    target = enemyTarget;
                } else if (enemy.alertTimer <= 0 && enemy.faction < factionWander.length) {
                    const wander = factionWander[enemy.faction];
                    target = {
                        type: 'wander',
                        x: wander.x + (enemy.wanderOffsetX || 0),
                        y: wander.y + (enemy.wanderOffsetY || 0),
                        distance: Math.hypot(wander.x + (enemy.wanderOffsetX || 0) - centerX, wander.y + (enemy.wanderOffsetY || 0) - centerY)
                    };
                } else {
                    target = null;
                }

                if (target) {
                    enemy.desiredFacingAngle = Math.atan2(target.y - centerY, target.x - centerX);
                } else if (enemy.alertTimer > 0 && !hasEnemyTarget) {
                    const baseAngle = Math.atan2(enemy.alertTargetY - centerY, enemy.alertTargetX - centerX);
                    const sweep = Math.sin(performance.now() * 0.004 + (enemy.lookOffset || 0)) * (enemyFovAngle * 0.6);
                    enemy.desiredFacingAngle = baseAngle + sweep;
                }

                enemy.facingAngle = lerpAngle(enemy.facingAngle || 0, enemy.desiredFacingAngle || 0, 0.08);

                const targetX = target ? target.x : centerX;
                const targetY = target ? target.y : centerY;
                const dx = targetX - centerX;
                const dy = targetY - centerY;
                const distance = Math.hypot(dx, dy) || 1;
                const hasLOS = target ? hasLineOfSight(centerX, centerY, targetX, targetY) : false;
                const isEliteSniper = enemy.eliteType === 'eliteSniper';

                if (!isMelee && target) {
                    if (target.type === 'player') {
                        enemy.behavior = 'shoot';
                        enemy.coverPoint = null;
                        enemy.peekPoint = null;
                        enemy.behaviorTimer = Math.max(enemy.behaviorTimer, 60);
                    }
                    if (enemyIsElite) {
                        enemy.behavior = 'shoot';
                        enemy.coverPoint = null;
                        enemy.peekPoint = null;
                    } else {
                        enemy.behaviorTimer--;
                        if (enemy.behaviorTimer <= 0) {
                            if (enemy.behavior === 'shoot') {
                                enemy.behavior = 'cover';
                                enemy.behaviorTimer = 80 + Math.floor(Math.random() * 60);
                                enemy.coverPoint = getCoverPoint(enemy, targetX, targetY);
                                enemy.coverRecalcTimer = 40;
                                enemy.peekPoint = null;
                                const roll = Math.random();
                                enemy.coverAction = roll < 0.5 ? 'cover' : roll < 0.8 ? 'peek' : 'hold';
                                if (!enemy.coverPoint) {
                                    enemy.behavior = 'shoot';
                                    enemy.behaviorTimer = 100 + Math.floor(Math.random() * 80);
                                }
                            } else {
                                enemy.behavior = 'shoot';
                                enemy.behaviorTimer = 100 + Math.floor(Math.random() * 80);
                                enemy.coverPoint = null;
                                enemy.peekPoint = null;
                            }
                        }
                    }
                }

                let moveX = 0;
                let moveY = 0;

                if (isMelee) {
                    if (target && (target.type === 'player' || target.type === 'memory')) {
                        moveTowardWithAvoidance(enemy, targetX, targetY, effectiveSpeed);
                    } else if (target && target.type === 'wander') {
                        moveX = (dx / distance) * effectiveSpeed * 0.7;
                        moveY = (dy / distance) * effectiveSpeed * 0.7;
                    }
                } else if (target && enemy.behavior === 'cover' && target.type !== 'wander') {
                    enemy.coverRecalcTimer--;
                    if (!enemy.coverPoint || enemy.coverRecalcTimer <= 0) {
                        enemy.coverPoint = getCoverPoint(enemy, targetX, targetY);
                        enemy.coverRecalcTimer = 40;
                        enemy.peekPoint = null;
                    }

                    if (enemy.coverPoint) {
                        if (enemy.coverAction === 'cover') {
                            const cdx = enemy.coverPoint.x - enemy.x;
                            const cdy = enemy.coverPoint.y - enemy.y;
                            const cdist = Math.hypot(cdx, cdy);
                            if (cdist > 4) {
                                moveX = (cdx / cdist) * effectiveSpeed;
                                moveY = (cdy / cdist) * effectiveSpeed;
                            }
                        } else if (enemy.coverAction === 'peek') {
                            if (!enemy.peekPoint) {
                                const toTargetX = targetX - enemy.coverPoint.x;
                                const toTargetY = targetY - enemy.coverPoint.y;
                                const len = Math.hypot(toTargetX, toTargetY) || 1;
                                const peekOffset = 80;
                                enemy.peekPoint = {
                                    x: clamp(enemy.coverPoint.x + (toTargetX / len) * peekOffset, 0, mapWidth - enemy.width),
                                    y: clamp(enemy.coverPoint.y + (toTargetY / len) * peekOffset, 0, mapHeight - enemy.height)
                                };
                            }
                            const pdx = enemy.peekPoint.x - enemy.x;
                            const pdy = enemy.peekPoint.y - enemy.y;
                            const pdist = Math.hypot(pdx, pdy);
                            if (pdist > 4) {
                                moveX = (pdx / pdist) * effectiveSpeed;
                                moveY = (pdy / pdist) * effectiveSpeed;
                            }
                        }
                    }
                } else if (target) {
                    const desiredRange = isEliteSniper ? 560 : (enemy.eliteType === 'eliteFlame' ? 190 : (enemy.eliteType === 'eliteMinigun' ? 280 : 240));
                    if (target.type === 'wander') {
                        moveX = (dx / distance) * effectiveSpeed * 0.65;
                        moveY = (dy / distance) * effectiveSpeed * 0.65;
                    } else if (!hasLOS) {
                        moveAlongWall(enemy, targetX, targetY, effectiveSpeed);
                    } else {
                        enemy.wallFollowTimer = 0;
                        enemy.wallFollowDirX = 0;
                        enemy.wallFollowDirY = 0;
                        if (distance > desiredRange * 1.1) {
                            moveX = (dx / distance) * effectiveSpeed;
                            moveY = (dy / distance) * effectiveSpeed;
                        } else if (distance < desiredRange * 0.7) {
                            moveX = (-dx / distance) * effectiveSpeed;
                            moveY = (-dy / distance) * effectiveSpeed;
                        } else if (enemyIsElite) {
                            const strafeAngle = Math.atan2(dy, dx) + (Math.random() > 0.5 ? Math.PI / 2 : -Math.PI / 2);
                            moveX = Math.cos(strafeAngle) * effectiveSpeed * 0.75;
                            moveY = Math.sin(strafeAngle) * effectiveSpeed * 0.75;
                        }
                    }
                }

                if (moveX !== 0 || moveY !== 0) {
                    if (enemy.flying) {
                        // Flying enemies ignore obstacle collision
                        enemy.x = clamp(enemy.x + moveX, 0, mapWidth - enemy.width);
                        enemy.y = clamp(enemy.y + moveY, 0, mapHeight - enemy.height);
                    } else {
                        moveEntityWithCollisions(enemy, moveX, moveY);
                    }
                    enemy.desiredFacingAngle = Math.atan2(moveY, moveX);
                }

                // Commander buffs nearby allies
                if (enemy.buffsNearby) {
                    if (!enemy.buffTimer) enemy.buffTimer = 0;
                    enemy.buffTimer++;
                    if (enemy.buffTimer >= 120) {
                        enemy.buffTimer = 0;
                        for (let other of enemies) {
                            if (other === enemy) continue;
                            const dx2 = (other.x + other.width/2) - centerX;
                            const dy2 = (other.y + other.height/2) - centerY;
                            if (Math.hypot(dx2, dy2) < 200) {
                                other.commanderBuff = 60;
                            }
                        }
                    }
                }

                // Re-evaluate LOS after movement for cover decisions
                const movedCenterX = enemy.x + enemy.width / 2;
                const movedCenterY = enemy.y + enemy.height / 2;
                const movedHasLOS = target ? hasLineOfSight(movedCenterX, movedCenterY, targetX, targetY) : false;

                if (!isMelee && target && enemy.behavior === 'cover' && enemy.coverAction !== 'hold') {
                    if (enemy.coverAction === 'cover' && movedHasLOS) {
                        enemy.coverAction = 'peek';
                        enemy.peekPoint = null;
                    } else if (enemy.coverAction === 'peek' && !movedHasLOS) {
                        enemy.coverAction = 'cover';
                    }
                }

                if (!isMelee && target && enemy.behavior === 'shoot') {
                    if (!enemyIsElite && enemy.maxAmmo > 0 && enemy.reloadTimer > 0) {
                        continue;
                    }

                    if (!enemyIsElite && enemy.maxAmmo > 0 && enemy.ammo <= 0) {
                        enemy.reloadTimer = enemy.reloadDuration || 120;
                        continue;
                    }

                    const weapon = getEnemyWeaponConfig(enemy);
                    const maxShootRange = target.type === 'player'
                        ? enemySightRange
                        : (isEliteSniper ? 1300 : 700);
                    if (isEliteSniper && enemy.sniperWarningTimer > 0) {
                        enemy.sniperWarningTimer--;
                        if (enemy.sniperWarningTimer <= 0) {
                            const shootDx = enemy.sniperTargetX - movedCenterX;
                            const shootDy = enemy.sniperTargetY - movedCenterY;
                            const baseAngle = Math.atan2(shootDy, shootDx);
                            enemyBullets.push({
                                x: movedCenterX,
                                y: movedCenterY,
                                velocityX: Math.cos(baseAngle) * weapon.bulletSpeed,
                                velocityY: Math.sin(baseAngle) * weapon.bulletSpeed,
                                size: weapon.bulletSize,
                                color: '#ff3333',
                                faction: enemy.faction,
                                damage: weapon.damage,
                                sourceElite: enemyIsElite,
                                appliesBurn: false,
                                burnDamage: 0,
                                burnDuration: 0,
                                trail: [],
                                trailMax: Math.max(bulletTrailMin, Math.min(bulletTrailMax, Math.round(weapon.bulletSpeed)))
                            });
                            const playerDistance = Math.hypot(movedCenterX - playerCenterX, movedCenterY - playerCenterY);
                            playGunshot(playerDistance);
                            enemy.shootCooldown = weapon.fireCooldownFrames + Math.floor(Math.random() * 4);
                            if (!enemyIsElite && enemy.maxAmmo > 0) {
                                enemy.ammo -= 1;
                                if (enemy.ammo <= 0) {
                                    enemy.reloadTimer = enemy.reloadDuration || 120;
                                }
                            }
                        }
                    } else if (enemy.shootCooldown > 0) {
                        enemy.shootCooldown--;
                    } else if (distance < maxShootRange && movedHasLOS) {
                        if (isEliteSniper) {
                            enemy.sniperWarningTimer = 24;
                            enemy.sniperTargetX = playerCenterX;
                            enemy.sniperTargetY = playerCenterY;
                        } else {
                            const shootDx = targetX - movedCenterX;
                            const shootDy = targetY - movedCenterY;
                            const baseAngle = Math.atan2(shootDy, shootDx);
                            for (let shot = 0; shot < weapon.shotsPerTrigger; shot++) {
                                const spreadOffset = (Math.random() - 0.5) * weapon.spread;
                                const angle = baseAngle + spreadOffset;
                                enemyBullets.push({
                                    x: movedCenterX,
                                    y: movedCenterY,
                                    velocityX: Math.cos(angle) * weapon.bulletSpeed,
                                    velocityY: Math.sin(angle) * weapon.bulletSpeed,
                                    size: weapon.bulletSize,
                                    color: enemy.color,
                                    faction: enemy.faction,
                                    damage: weapon.damage,
                                    sourceElite: enemyIsElite,
                                    appliesBurn: !!weapon.appliesBurn,
                                    burnDamage: weapon.burnDamage || 0,
                                    burnDuration: weapon.burnDuration || 0,
                                    appliesPoison: !!weapon.appliesPoison,
                                    blindsPlayer: !!weapon.blindsPlayer,
                                    trail: [],
                                    trailMax: Math.max(bulletTrailMin, Math.min(bulletTrailMax, Math.round(weapon.bulletSpeed)))
                                });
                            }
                            const playerDistance = Math.hypot(movedCenterX - playerCenterX, movedCenterY - playerCenterY);
                            playGunshot(playerDistance);
                            enemy.shootCooldown = weapon.fireCooldownFrames + Math.floor(Math.random() * 6);
                            if (!enemyIsElite && enemy.maxAmmo > 0) {
                                enemy.ammo -= 1;
                                if (enemy.ammo <= 0) {
                                    enemy.reloadTimer = enemy.reloadDuration || 120;
                                }
                            }
                        }
                    }
                } else if (!isMelee && enemy.shootCooldown > 0) {
                    enemy.shootCooldown--;
                }

                // Melee collision with player
                if (rectsIntersect(enemy.x, enemy.y, enemy.width, enemy.height, player.x, player.y, player.width, player.height)) {
                    applyPlayerDamage(enemy.meleeDamage || 10);
                }

                // Check collision with player bullets
                let killed = false;
                for (let j = bullets.length - 1; j >= 0; j--) {
                    if (bullets[j].x > enemy.x &&
                        bullets[j].x < enemy.x + enemy.width &&
                        bullets[j].y > enemy.y &&
                        bullets[j].y < enemy.y + enemy.height) {

                        // Shield Mouse: deflect frontal shots
                        if (enemy.hasShield) {
                            const bulletAngle = Math.atan2(bullets[j].velocityY, bullets[j].velocityX);
                            const facingDiff = Math.abs(((bulletAngle - enemy.facingAngle) + Math.PI * 3) % (Math.PI * 2) - Math.PI);
                            if (facingDiff < Math.PI / 3) {
                                createHitEffect(bullets[j].x, bullets[j].y, '#ffff00');
                                bullets.splice(j, 1);
                                break;
                            }
                        }

                        applyDamageToEnemy(enemy, bullets[j].damage || 1);
                        if (bullets[j].appliesBurn) {
                            applyBurnToEnemy(enemy, bullets[j].burnDamage || 1, bullets[j].burnDuration || 120);
                        }
                        if (bullets[j].appliesCryo) {
                            enemy.iceSlow = 0.45;
                            enemy.iceSlowTimer = 120;
                            createHitEffect(bullets[j].x, bullets[j].y, '#88eeff');
                        }
                        enemy.hitTimer = 10;
                        const hitCenterX = enemy.x + enemy.width / 2;
                        const hitCenterY = enemy.y + enemy.height / 2;
                        enemy.lastSeenTimer = 240;
                        enemy.lastSeenX = playerCenterX;
                        enemy.lastSeenY = playerCenterY;
                        enemy.desiredFacingAngle = Math.atan2(playerCenterY - hitCenterY, playerCenterX - hitCenterX);
                        const hitColor = bullets[j].appliesAcid ? '#aaff00' : (bullets[j].appliesCryo ? '#88eeff' : '#ff6666');
                        createHitEffect(bullets[j].x, bullets[j].y, hitColor);
                        const playerDistance = Math.hypot(bullets[j].x - playerCenterX, bullets[j].y - playerCenterY);
                        playHitSound(playerDistance);
                        if (!bullets[j].isFlame) createExplosion(bullets[j].x, bullets[j].y);

                        // Piercing bullet: don't remove until pierceCount depleted
                        if (bullets[j] && bullets[j].piercing && bullets[j].pierceCount > 0) {
                            bullets[j].pierceCount--;
                        } else if (bullets[j]) {
                            bullets.splice(j, 1);
                        }

                        if (enemy.health <= 0) {
                            killEnemy(i, true);
                            killed = true;
                        }
                        break;
                    }
                }

                if (killed) {
                    continue;
                }

                if (enemy.hitTimer > 0) {
                    enemy.hitTimer--;
                }
            }
            
            // Update invulnerability
            if (player.invulnerable) {
                player.invulnerableTime--;
                if (player.invulnerableTime <= 0) {
                    player.invulnerable = false;
                }
            }
        }

        // Update difficulty
        function updateDifficulty() {
            if (difficulty < maxDifficulty) {
                difficultyProgress += difficultyIncreaseRate;
                
                // When progress reaches 100, level up and reset progress
                if (difficultyProgress >= 100) {
                    difficulty++;
                    difficultyProgress = 0;
                    
                    if (difficulty > maxDifficulty) {
                        difficulty = maxDifficulty;
                    }
                }
            }
        }

        // Update coins
        function updateCoins() {
            const pickupRadius = player.pickupRange || 40;
            
            for (let i = coins.length - 1; i >= 0; i--) {
                const coin = coins[i];
                const dx = (player.x + player.width / 2) - coin.x;
                const dy = (player.y + player.height / 2) - coin.y;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                // Magnetic pull only if within pickup radius
                if (distance < pickupRadius && distance > 0) {
                    const pullSpeed = 5;
                    coin.x += (dx / distance) * pullSpeed;
                    coin.y += (dy / distance) * pullSpeed;
                    
                    // Pick up coin if very close to player center
                    if (distance < 10) {
                        money += coin.value;
                        runMoneyEarned += coin.value;
                        playCoinPickupSound();
                        coins.splice(i, 1);
                    }
                }
            }
        }

        function updateHealingItems() {
            const pickupRadius = player.pickupRange || 40;
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;

            for (let i = healingItems.length - 1; i >= 0; i--) {
                const item = healingItems[i];
                const dx = playerCenterX - item.x;
                const dy = playerCenterY - item.y;
                const distance = Math.hypot(dx, dy);

                if (distance < pickupRadius && distance > 0) {
                    const pullSpeed = 5;
                    item.x += (dx / distance) * pullSpeed;
                    item.y += (dy / distance) * pullSpeed;

                    if (distance < 10) {
                        player.health = Math.min(player.maxHealth, player.health + item.healAmount);
                        player.health = Math.floor(player.health);
                        healingItems.splice(i, 1);
                    }
                }
            }
        }

        // Draw mouse player character
        function drawMouseCharacter(cx, cy, angle, hitFlash, burnFlash, alpha, walkPhase, skin) {
            const s = skin || skinDefs[equippedSkinId] || skinDefs.default;
            ctx.save();
            ctx.globalAlpha = alpha !== undefined ? alpha : 1;
            const bob = walkPhase !== undefined ? Math.sin(walkPhase) * 1.8 : 0;
            ctx.translate(cx, cy + bob);
            ctx.rotate(angle);

            // Tail (animated with walk)
            const tailSwing = walkPhase !== undefined ? Math.sin(walkPhase * 0.7) * 5 : 0;
            ctx.save();
            ctx.strokeStyle = s.tail;
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(-10, 0);
            ctx.bezierCurveTo(-22, 8 + tailSwing, -28, -6 + tailSwing * 0.5, -32, 4 + tailSwing * 0.3);
            ctx.stroke();
            ctx.restore();

            // Body (round ellipse — squish slightly when bobbing)
            const squish = walkPhase !== undefined ? Math.abs(Math.sin(walkPhase)) * 0.06 : 0;
            ctx.fillStyle = hitFlash ? '#ffffff' : s.body;
            ctx.beginPath();
            ctx.ellipse(0, 0, 14 * (1 + squish), 12 * (1 - squish), 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = s.bodyStroke;
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Feet (visible as small ovals when walking)
            if (walkPhase !== undefined) {
                const lf = Math.sin(walkPhase) * 4;
                const rf = -Math.sin(walkPhase) * 4;
                ctx.fillStyle = hitFlash ? '#ffffff' : s.feet;
                ctx.beginPath(); ctx.ellipse(-4, 10 + lf, 3, 2, 0.3, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(4, 10 + rf, 3, 2, -0.3, 0, Math.PI*2); ctx.fill();
            }

            // Left ear (wiggle slightly)
            const earWig = walkPhase !== undefined ? Math.sin(walkPhase * 0.5) * 1.5 : 0;
            ctx.fillStyle = hitFlash ? '#ffffff' : s.ear;
            ctx.beginPath();
            ctx.arc(-6, -12 + earWig, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = s.earStroke; ctx.lineWidth = 1; ctx.stroke();

            // Right ear
            ctx.fillStyle = hitFlash ? '#ffffff' : s.ear;
            ctx.beginPath();
            ctx.arc(4, -13 - earWig, 5, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = s.earStroke; ctx.lineWidth = 1; ctx.stroke();

            // Snout
            ctx.fillStyle = hitFlash ? '#ffffff' : s.ear;
            ctx.beginPath();
            ctx.arc(15, 0, 4, 0, Math.PI * 2);
            ctx.fill();

            // Nose dot
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(18, 0, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = '#222';
            ctx.beginPath(); ctx.arc(9, -5, 2, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(9, 5, 2, 0, Math.PI * 2); ctx.fill();
            // Eye shine
            ctx.fillStyle = '#ffffff';
            ctx.beginPath(); ctx.arc(10, -5.5, 0.7, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(10, 4.5, 0.7, 0, Math.PI * 2); ctx.fill();

            if (burnFlash) {
                ctx.globalAlpha = burnFlash;
                ctx.fillStyle = '#ff6633';
                ctx.beginPath();
                ctx.ellipse(0, 0, 17, 15, 0, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.restore();
        }

        // Draw player
        function drawPlayer() {
            const cx = player.x + player.width / 2 - camera.x;
            const cy = player.y + player.height / 2 - camera.y;
            const angle = Math.atan2(
                (mousePosition.y + camera.y) - (player.y + player.height / 2),
                (mousePosition.x + camera.x) - (player.x + player.width / 2)
            );

            if (player.dashTimer > 0) {
                const dashAlpha = (player.dashTimer / player.dashFrames) * 0.5;
                drawMouseCharacter(
                    cx - player.dashVelocityX * 1.5,
                    cy - player.dashVelocityY * 1.5,
                    angle, false, false, dashAlpha
                );
            }

            const burnAlpha = player.burnVisualTimer > 0 ? (0.35 + 0.25 * Math.sin(performance.now() * 0.03)) : 0;
            const hitFlash = player.hitTimer > 0;
            const cloakAlpha = smokeCloakTimer > 0 ? 0.35 : 1;
            const isMoving = Math.abs(player.velocityX) > 0.2 || Math.abs(player.velocityY) > 0.2;
            const walkPhase = isMoving ? gameTime * 0.22 : undefined;
            drawMouseCharacter(cx, cy, angle, hitFlash, burnAlpha > 0 ? burnAlpha : false, cloakAlpha, walkPhase);

            // Muzzle flash
            if (muzzleFlashTimer > 0) {
                const flashProgress = muzzleFlashTimer / 4;
                const muzzleDist = 20;
                const mx = cx + Math.cos(muzzleFlashAngle) * muzzleDist;
                const my = cy + Math.sin(muzzleFlashAngle) * muzzleDist;
                ctx.save();
                ctx.globalAlpha = flashProgress * 0.9;
                ctx.fillStyle = '#ffffa0';
                ctx.beginPath();
                ctx.arc(mx, my, 7 * flashProgress, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#ffffff';
                ctx.beginPath();
                ctx.arc(mx, my, 3 * flashProgress, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            // Smoke cloak shimmer ring
            if (smokeCloakTimer > 0) {
                ctx.save(); ctx.globalAlpha = 0.25 + 0.1*Math.sin(performance.now()*0.01);
                ctx.strokeStyle = '#aaccff'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(cx, cy, 22, 0, Math.PI*2); ctx.stroke(); ctx.restore();
            }
            // Shield bubble glow
            if (shieldBubbleHits > 0) {
                ctx.save(); ctx.globalAlpha = 0.4 + 0.15*Math.sin(performance.now()*0.015);
                ctx.strokeStyle = '#44ffff'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(cx, cy, 26, 0, Math.PI*2); ctx.stroke();
                ctx.globalAlpha = 0.1; ctx.fillStyle = '#44ffff';
                ctx.beginPath(); ctx.arc(cx, cy, 26, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }
            // Frenzy aura
            if (frenzyTimer > 0) {
                ctx.save(); ctx.globalAlpha = 0.3 + 0.15*Math.sin(performance.now()*0.025);
                ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.arc(cx, cy, 24, 0, Math.PI*2); ctx.stroke(); ctx.restore();
            }
            // Poison tint
            if (player.poisonTimer > 0) {
                ctx.save(); ctx.globalAlpha = 0.25;
                ctx.fillStyle = '#44ff44';
                ctx.beginPath(); ctx.arc(cx, cy, 18, 0, Math.PI*2); ctx.fill(); ctx.restore();
            }

            if (player.meleeEffectTimer > 0) {
                ctx.strokeStyle = '#ffeeaa';
                ctx.lineWidth = 4;
                ctx.globalAlpha = player.meleeEffectTimer / 8;
                const arcAngle = Math.atan2(player.meleeDirY, player.meleeDirX);
                const arcSize = Math.PI * 0.85;
                ctx.beginPath();
                ctx.arc(cx, cy, player.meleeRange * 0.65, arcAngle - arcSize / 2, arcAngle + arcSize / 2);
                ctx.stroke();
                ctx.globalAlpha = 1;
            }

            // Reload bar above player
            if (player.isReloading) {
                const barWidth = 40;
                const barHeight = 5;
                const barX = cx - barWidth / 2;
                const barY = cy - 28;
                ctx.fillStyle = '#333';
                ctx.fillRect(barX, barY, barWidth, barHeight);
                const reloadProgress = 1 - (player.reloadTime / player.maxReloadTime);
                ctx.fillStyle = '#88ff44';
                ctx.fillRect(barX, barY, barWidth * reloadProgress, barHeight);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1;
                ctx.strokeRect(barX, barY, barWidth, barHeight);
            }
        }

        // Draw bullets — player bullets are yellowish seeds, enemy are dark blobs
        function drawBullets() {
            for (let bullet of bullets) {
                drawBulletTrail(bullet);
                if (bullet.isFlame) {
                    // Flamethrower: orange flame blob that fades
                    ctx.save();
                    ctx.globalAlpha = 0.7;
                    ctx.fillStyle = bullet.color || '#ff4400';
                    ctx.beginPath();
                    ctx.arc(bullet.x - camera.x, bullet.y - camera.y, bullet.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                } else {
                    ctx.fillStyle = bullet.color || '#e8d44d';
                    ctx.beginPath();
                    ctx.arc(bullet.x - camera.x, bullet.y - camera.y, bullet.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }
        }

        // Draw enemy bullets — dark blobs
        function drawEnemyBullets() {
            for (let bullet of enemyBullets) {
                drawBulletTrail(bullet);
                // Dark colored blob for enemy bullets
                ctx.fillStyle = '#3a1a0a';
                ctx.beginPath();
                ctx.arc(bullet.x - camera.x, bullet.y - camera.y, bullet.size + 1, 0, Math.PI * 2);
                ctx.fill();
                // Colored core
                ctx.fillStyle = bullet.color || '#8b3a1a';
                ctx.beginPath();
                ctx.arc(bullet.x - camera.x, bullet.y - camera.y, bullet.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        // Draw particles
        function drawParticles() {
            for (let particle of particles) {
                const alpha = particle.life / particle.maxLife;
                ctx.globalAlpha = alpha;
                if (particle.isRing) {
                    // Expanding ring
                    const progress = 1 - alpha;
                    const radius = 4 + (particle.maxSize || 28) * progress;
                    ctx.strokeStyle = particle.color;
                    ctx.lineWidth = 3 * alpha;
                    ctx.beginPath();
                    ctx.arc(particle.x - camera.x, particle.y - camera.y, radius, 0, Math.PI * 2);
                    ctx.stroke();
                } else {
                    ctx.fillStyle = particle.color;
                    ctx.beginPath();
                    ctx.arc(particle.x - camera.x, particle.y - camera.y, particle.size, 0, Math.PI * 2);
                    ctx.fill();
                }

        function drawCockroach(cx, cy, angle, scale, hitFlash, walkPhase) {
            ctx.save();
            ctx.translate(cx, cy);
            ctx.rotate(angle);
            ctx.scale(scale, scale);
            const bodyColor = hitFlash ? '#ffffff' : '#4a2800';
            const legColor = hitFlash ? '#ffffff' : '#3a1e00';

            // Body (dark brown oval)
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(0, 0, 13, 8, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.strokeStyle = legColor;
            ctx.lineWidth = 1;
            ctx.stroke();

            // Head
            ctx.fillStyle = bodyColor;
            ctx.beginPath();
            ctx.ellipse(14, 0, 5, 4, 0, 0, Math.PI * 2);
            ctx.fill();

            // 6 animated legs (3 per side) — alternate phase per pair
            ctx.strokeStyle = legColor;
            ctx.lineWidth = 1.2;
            for (let i = 0; i < 3; i++) {
                const lx = -4 + i * 6;
                const legWave = walkPhase !== undefined ? Math.sin(walkPhase + i * 2.1) * 4 : 0;
                // top leg
                ctx.beginPath();
                ctx.moveTo(lx, -8);
                ctx.lineTo(lx - 3, -16 + legWave);
                ctx.stroke();
                // bottom leg (opposite phase)
                ctx.beginPath();
                ctx.moveTo(lx, 8);
                ctx.lineTo(lx - 3, 16 - legWave);
                ctx.stroke();
            }

            // Antennae (twitch slightly)
            const antennaWig = walkPhase !== undefined ? Math.sin(walkPhase * 0.3) * 2 : 0;
            ctx.strokeStyle = legColor;
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            ctx.moveTo(17, -2);
            ctx.quadraticCurveTo(24, -8 + antennaWig, 30, -5 + antennaWig);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(17, 2);
            ctx.quadraticCurveTo(24, 8 - antennaWig, 30, 5 - antennaWig);
            ctx.stroke();

            ctx.restore();
        }

        function drawRivalMouse(cx, cy, angle, hitFlash, walkPhase) {
            ctx.save();

            // Tail (animated)

            ctx.arc(17, 0, 1.5, 0, Math.PI * 2);
            ctx.fill();

            // Eyes (more aggressive — angled)

            ctx.arc(8, -4, 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(8, 4, 2, 0, Math.PI * 2);
            ctx.fill();

            ctx.fillRect(10, -1, 8, 2);

        function drawRat(cx, cy, angle, hitFlash, walkPhase) {

        function drawEarwig(cx, cy, angle, hitFlash, walkPhase) {

        function drawCentipede(cx, cy, angle, hitFlash, walkPhase) {

                ctx.strokeStyle = '#3a0a00'; ctx.lineWidth = 1; ctx.stroke();
                if (s > 0) {

                    ctx.strokeStyle = hitFlash ? '#ffffff' : '#3a1000'; ctx.lineWidth = 1.2;
                    ctx.beginPath(); ctx.moveTo(sx, segBob); ctx.lineTo(sx - 2, 6 + legWave + segBob); ctx.stroke();
                    ctx.beginPath(); ctx.moveTo(sx, segBob); ctx.lineTo(sx - 2, -6 - legWave + segBob); ctx.stroke();
                }
            }
            // Head mandibles
            ctx.strokeStyle = hitFlash ? '#ffffff' : '#8b1a00'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(7, -3); ctx.lineTo(14, -7); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(7, 3); ctx.lineTo(14, 7); ctx.stroke();
            ctx.fillStyle = '#ff2200'; ctx.beginPath(); ctx.arc(5, -2, 1.5, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.arc(5, 2, 1.5, 0, Math.PI*2); ctx.fill();

        }

        function drawFireAnt(cx, cy, angle, hitFlash, walkPhase) {

            ctx.fillStyle = '#ff8800'; ctx.beginPath(); ctx.arc(7, -2, 1.2, 0, Math.PI*2); ctx.fill();

        function drawBeetleTank(cx, cy, angle, hitFlash, walkPhase) {

        function drawMoth(cx, cy, angle, hitFlash, walkPhase) {

        // Draw enemies with themed art
        function drawEnemies() {
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            for (let enemy of enemies) {
                const enemyCenterX = enemy.x + enemy.width / 2;
                const enemyCenterY = enemy.y + enemy.height / 2;
                if (!hasLineOfSight(playerCenterX, playerCenterY, enemyCenterX, enemyCenterY)) {
                    continue;
                }
                const ecx = enemyCenterX - camera.x;
                const ecy = enemyCenterY - camera.y;
                const safeFacing = Number.isFinite(enemy.facingAngle) ? enemy.facingAngle : 0;
                const hitFlash = enemy.hitTimer > 0;

                // Vision cone
                ctx.save();
                ctx.globalAlpha = 0.12;
                ctx.fillStyle = '#fff6cc';
                ctx.beginPath();
                ctx.moveTo(ecx, ecy);
                ctx.arc(ecx, ecy, enemyConeLength, safeFacing - enemyFovAngle / 2, safeFacing + enemyFovAngle / 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();

                // Walk phase — enemies get unique phase based on their index to avoid sync
                const isMovingEnemy = Math.abs(enemy.velocityX || 0) > 0.1 || Math.abs(enemy.velocityY || 0) > 0.1;
                const enemyWalkPhase = isMovingEnemy ? gameTime * 0.2 + (enemy.x * 0.01) : undefined;

                // Dispatch drawing by drawFn field (new enemy type system) or fall back to faction
                const drawFn = enemy.drawFn || (enemy.isElite ? 'cockroach' : (enemy.faction === 0 ? 'cockroach' : (enemy.faction === 1 ? 'rivalMouse' : 'rat')));
                switch (drawFn) {
                    case 'cockroach':
                        drawCockroach(ecx, ecy, safeFacing, enemy.scale || 1, hitFlash, enemyWalkPhase);
                        if (enemy.isElite && !hitFlash) {
                            ctx.save(); ctx.translate(ecx, ecy); ctx.rotate(safeFacing);
                            ctx.fillStyle = '#ff2200';
                            ctx.beginPath(); ctx.arc(16, -3, 2, 0, Math.PI*2); ctx.fill();
                            ctx.beginPath(); ctx.arc(16, 3, 2, 0, Math.PI*2); ctx.fill();
                            ctx.restore();
                        }
                        break;
                    case 'flyingRoach': drawFlyingRoach(ecx, ecy, safeFacing, enemy.scale || 1, hitFlash, enemyWalkPhase); break;
                    case 'rivalMouse':  drawRivalMouse(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'shieldMouse': drawShieldMouse(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'rat':         drawRat(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'ratCommander': drawRatCommander(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'earwig':      drawEarwig(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'centipede':   drawCentipede(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'fireAnt':     drawFireAnt(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'beetleTank':  drawBeetleTank(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    case 'moth':        drawMoth(ecx, ecy, safeFacing, hitFlash, enemyWalkPhase); break;
                    default:
                        ctx.fillStyle = hitFlash ? '#ffffff' : (enemy.color || '#888');
                        ctx.fillRect(enemy.x - camera.x, enemy.y - camera.y, enemy.width, enemy.height);
                }
                // Commander buff ring on nearby allies
                if (enemy.commanderBuff > 0) {
                    ctx.save(); ctx.globalAlpha = 0.3; ctx.strokeStyle = '#cc44ff'; ctx.lineWidth = 2;
                    ctx.beginPath(); ctx.arc(ecx, ecy, 18, 0, Math.PI*2); ctx.stroke(); ctx.restore();
                }

                if (!enemy.isElite && enemy.reloadTimer > 0) {
                    ctx.fillStyle = '#ffeeaa';
                    ctx.font = '10px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText('RELOADING', ecx, enemy.y - camera.y - 20);
                }

                if (enemy.eliteType === 'eliteSniper' && enemy.sniperWarningTimer > 0) {
                    ctx.save();
                    ctx.globalAlpha = Math.min(0.85, 0.35 + enemy.sniperWarningTimer / 30);
                    ctx.strokeStyle = '#ff2222';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(ecx, ecy);
                    ctx.lineTo(enemy.sniperTargetX - camera.x, enemy.sniperTargetY - camera.y);
                    ctx.stroke();
                    ctx.fillStyle = '#ff4444';
                    ctx.beginPath();
                    ctx.arc(enemy.sniperTargetX - camera.x, enemy.sniperTargetY - camera.y, 5, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
            }
            ctx.globalAlpha = 1;
        }

            const playerCenterY = player.y + player.height / 2;
            for (let coin of coins) {
                // Only check line of sight, no radius limit

                ctx.fillStyle = coin.color;

                    coin.y - camera.y,
                    coin.size,
                    0,
                    Math.PI * 2
                );
                ctx.fill();

                ctx.lineWidth = 1;
                ctx.stroke();

                    ctx.fillStyle = '#ffcc44';
                    ctx.font = '9px Arial';
