        function spawnExtractDoor() {
            // Try to find a safe location for the door
            const doorWidth = extractDoor.width;
            const doorHeight = extractDoor.height;
            const minDistanceFromCenter = 900;
            const minDistanceFromPlayer = 700;
            const centerX = mapWidth / 2;
            const centerY = mapHeight / 2;
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            let bestFallback = null;
            let bestScore = -Infinity;

            for (let i = 0; i < 120; i++) {
                const candidate = getRandomWalkablePosition(doorWidth, doorHeight);
                const x = candidate.x;
                const y = candidate.y;
                const doorCenterX = x + doorWidth / 2;
                const doorCenterY = y + doorHeight / 2;

                // Check distance from center (player spawn)
                const distFromCenter = Math.hypot(doorCenterX - centerX, doorCenterY - centerY);
                if (distFromCenter < minDistanceFromCenter) {
                    continue;
                }

                const distFromPlayer = Math.hypot(doorCenterX - playerCenterX, doorCenterY - playerCenterY);
                if (distFromPlayer < minDistanceFromPlayer) {
                    continue;
                }

                if (!isRectInWalkableArea(x, y, doorWidth, doorHeight)) {
                    continue;
                }

                // Check no obstacle collision (redundant but safe)
                if (checkObstacleCollision(x, y, doorWidth, doorHeight)) {
                    continue;
                }

                const score = distFromCenter + distFromPlayer;
                if (score > bestScore) {
                    bestScore = score;
                    bestFallback = { x, y };
                }

                if (distFromCenter > minDistanceFromCenter + 300 && distFromPlayer > minDistanceFromPlayer + 250) {
                    extractDoor.x = x;
                    extractDoor.y = y;
                    return;
                }
            }

            if (bestFallback) {
                extractDoor.x = bestFallback.x;
                extractDoor.y = bestFallback.y;
                return;
            }

            // Last resort: any valid walkable, obstacle-free spot
            for (let i = 0; i < 80; i++) {
                const fallback = getRandomWalkablePosition(doorWidth, doorHeight);
                if (!isRectInWalkableArea(fallback.x, fallback.y, doorWidth, doorHeight)) {
                    continue;
                }
                if (checkObstacleCollision(fallback.x, fallback.y, doorWidth, doorHeight)) {
                    continue;
                }
                extractDoor.x = fallback.x;
                extractDoor.y = fallback.y;
                return;
            }

            extractDoor.x = centerX - doorWidth / 2;
            extractDoor.y = centerY - doorHeight / 2;
        }

        function updateExtractDoor() {
            // Check if player is near and wants to interact
            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const doorCenterX = extractDoor.x + extractDoor.width / 2;
            const doorCenterY = extractDoor.y + extractDoor.height / 2;
            const distance = Math.hypot(playerCenterX - doorCenterX, playerCenterY - doorCenterY);

            if (distance < extractDoor.interactDistance && (keys['e'] || keys['enter'])) {
                // Player interacts with door - extract and return to base
                extractPlayer();
            }
        }

        function extractPlayer() {
            // Bank run crumbs into localStorage — safe from future deaths
            const prevBanked = parseInt(localStorage.getItem('mh_bankedCrumbs') || '0', 10);
            localStorage.setItem('mh_bankedCrumbs', String(prevBanked + Math.floor(runMoneyEarned)));
            recordRunToJournal(true);
            // Unlock the next level on first successful extraction from this one
            const nextLevel = currentLevel + 1;
            if (nextLevel <= 4) {
                try {
                    const unlockedLevels = JSON.parse(localStorage.getItem('mh_unlockedLevels') || '[1]');
                    if (!unlockedLevels.includes(nextLevel)) {
                        unlockedLevels.push(nextLevel);
                        localStorage.setItem('mh_unlockedLevels', JSON.stringify(unlockedLevels));
                    }
                } catch(e) {}
            }
            stopAmbientMusic();
            gameState = 'extracted';
            extractionTimer = 0;
        }

        function updateExtractionScreen() {
            extractionTimer++;
            // Play a little celebratory sparkle sound
            if (extractionTimer === 1 && audioContext) {
                const osc = audioContext.createOscillator();
                const gain = audioContext.createGain();
                osc.connect(gain); gain.connect(audioContext.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(440, audioContext.currentTime);
                osc.frequency.exponentialRampToValueAtTime(880, audioContext.currentTime + 0.15);
                osc.frequency.exponentialRampToValueAtTime(1320, audioContext.currentTime + 0.3);
                gain.gain.setValueAtTime(0.18, audioContext.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
                osc.start(); osc.stop(audioContext.currentTime + 0.5);
            }
            if (extractionTimer >= 210) {
                window.location.href = `base.html?${buildBaseStateQuery()}`;
            }
        }

        function drawExtractionScreen() {
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            const t = extractionTimer;
            const fadeIn = Math.min(1, t / 40);

            // Dark green overlay
            ctx.save();
            ctx.globalAlpha = Math.min(0.82, t / 50 * 0.82);
            ctx.fillStyle = '#001a00';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();

            if (fadeIn < 0.1) return;

            ctx.save();
            ctx.globalAlpha = fadeIn;

            // Animated particle sparkles
            const sparkCount = 18;
            for (let i = 0; i < sparkCount; i++) {
                const angle = (i / sparkCount) * Math.PI * 2 + t * 0.03;
                const r = 90 + Math.sin(t * 0.07 + i) * 18;
                const sx = cx + Math.cos(angle) * r;
                const sy = cy + Math.sin(angle) * r * 0.6;
                const sparkAlpha = 0.5 + 0.5 * Math.sin(t * 0.12 + i * 1.3);
                ctx.globalAlpha = fadeIn * sparkAlpha;
                ctx.fillStyle = i % 3 === 0 ? '#ffee44' : (i % 3 === 1 ? '#88ffaa' : '#ffffff');
                ctx.beginPath();
                ctx.arc(sx, sy, 3, 0, Math.PI * 2);
                ctx.fill();
            }

            ctx.globalAlpha = fadeIn;

            // "YOU ESCAPED!" title
            const bounce = t < 20 ? Math.sin(t / 20 * Math.PI) * 12 : 0;
            ctx.font = 'bold 58px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.shadowColor = '#44ff88';
            ctx.shadowBlur = 24;
            ctx.fillStyle = '#88ffaa';
            ctx.fillText('YOU ESCAPED!', cx, cy - 60 - bounce);
            ctx.shadowBlur = 0;

            // Stats
            const levelNames = { 1: 'The House', 2: 'Basement', 3: 'Attic', 4: 'The Yard' };
            const lvlName = levelNames[currentLevel] || `Level ${currentLevel}`;
            ctx.font = 'bold 20px Arial';
            ctx.fillStyle = '#c8f0c8';
            ctx.fillText(`${lvlName}  ·  Danger ${difficulty}`, cx, cy + 10);

            ctx.font = '18px Arial';
            ctx.fillStyle = '#aaddaa';
            ctx.fillText(`${runEnemiesKilled} enemies defeated  ·  ${runMoneyEarned} crumbs collected`, cx, cy + 44);

            // Returning message
            if (t > 80) {
                const blinkAlpha = 0.5 + 0.5 * Math.sin(t * 0.12);
                ctx.globalAlpha = fadeIn * blinkAlpha;
                ctx.font = 'bold 14px Arial';
                ctx.fillStyle = '#88cc88';
                ctx.fillText('Returning to base...', cx, cy + 95);
            }

            ctx.restore();
        }

        function drawExtractDoor() {
            const cx = extractDoor.x + extractDoor.width / 2 - camera.x;
            const cy = extractDoor.y + extractDoor.height / 2 - camera.y;
            const rx = extractDoor.width / 2;
            const ry = extractDoor.height / 2 + 4;

            // Dirt/debris around the hole
            ctx.save();
            ctx.fillStyle = '#a07840';
            ctx.globalAlpha = 0.55;
            for (let d = 0; d < 8; d++) {
                const da = (d / 8) * Math.PI * 2;
                const dr = rx + 6 + Math.sin(d * 2.3) * 4;
                ctx.beginPath();
                ctx.arc(cx + Math.cos(da) * dr, cy + Math.sin(da) * dr * 0.5, 3 + Math.sin(d) * 2, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();

            // Dark oval arch (the hole)
            ctx.save();
            ctx.fillStyle = '#1a1008';
            ctx.beginPath();
            ctx.ellipse(cx, cy, rx, ry, 0, 0, Math.PI * 2);
            ctx.fill();

            // Rough jagged edge
            ctx.strokeStyle = '#3a2808';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let a = 0; a <= Math.PI * 2; a += 0.25) {
                const jag = rx + Math.sin(a * 7.3) * 2.5;
                const jagY = ry + Math.sin(a * 5.7) * 2;
                const px2 = cx + Math.cos(a) * jag;
                const py2 = cy + Math.sin(a) * jagY;
                if (a === 0) ctx.moveTo(px2, py2);
                else ctx.lineTo(px2, py2);
            }
            ctx.closePath();
            ctx.stroke();
            ctx.restore();

            // BURROW label
            ctx.fillStyle = '#c8a060';
            ctx.font = 'bold 11px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'bottom';
            ctx.fillText('BURROW', cx, cy - ry - 4);

            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            const doorCenterX = extractDoor.x + extractDoor.width / 2;
            const doorCenterY = extractDoor.y + extractDoor.height / 2;
            const distance = Math.hypot(playerCenterX - doorCenterX, playerCenterY - doorCenterY);

            if (distance < extractDoor.interactDistance) {
                ctx.fillStyle = '#ffffff';
                ctx.font = 'bold 14px Arial';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'bottom';
                ctx.fillText('E to extract', cx, cy - ry - 18);
            }
        }
        
        function applyUpgradesToPlayer() {
            // Base speed: 2.4
            player.speed = 2.4 * (1 + upgrades.moveSpeed.level * 0.1);
            if (learnedSkills.passive.includes('nimble')) player.speed *= 1.15;

            // Base melee damage: 12
            player.meleeDamage = 12 + upgrades.damage.level * 2;

            // Base max HP: 100
            player.maxHealth = 100 + upgrades.maxHealth.level * 20;
            if (learnedSkills.passive.includes('ironHide')) player.maxHealth += 30;
            if (player.health > player.maxHealth) {
                player.health = player.maxHealth;
            }

            // Base pickup range: 40
            player.pickupRange = 40 + upgrades.pickupRange.level * 12;
            if (learnedSkills.passive.includes('longArms')) player.pickupRange += 80;

            // Tough Paws: reduce dash cooldown
            player.maxDashCooldown = 80;
            if (learnedSkills.passive.includes('toughPaws')) player.maxDashCooldown = Math.floor(player.maxDashCooldown * 0.8);

            // Adrenaline speed boost
            if (adrenalineTimer > 0) player.speed *= 1.3;

            // PackRat: clamp grenades to effective max
            const maxGrenades = getEffectiveGrenadeMax();
            if (grenadeCount > maxGrenades) grenadeCount = maxGrenades;
        }

        function applyUpgradesToWeapon(weapon) {
            // Apply damage upgrade
            weapon.damage = weapon.damage * (1 + upgrades.damage.level * 0.15);
            if (learnedSkills.passive.includes('sharpFangs')) weapon.damage *= 1.20;

            // Apply fire speed upgrade (reduce cooldown)
            weapon.fireCooldownFrames = Math.max(0, weapon.fireCooldownFrames - upgrades.fireSpeed.level * 2);
            if (learnedSkills.passive.includes('hairTrigger')) weapon.fireCooldownFrames = Math.max(0, Math.floor(weapon.fireCooldownFrames * 0.75));

            // Apply reload speed upgrade (reduce reload time)
            weapon.reloadFrames = Math.max(30, weapon.reloadFrames - upgrades.reloadSpeed.level * 10);
            if (learnedSkills.passive.includes('speedLoader')) weapon.reloadFrames = Math.max(20, Math.floor(weapon.reloadFrames * 0.75));
        }
        
        // Death animation variables
        let deathTimer = 0;
        let deathMoneyCount = 0;
        let deathKillsCount = 0;
        let deathMoneyPenalty = 0; // money lost due to death (divided by 10)
        let continueButtonHover = false;

        // Extract door
        const extractDoor = {
            x: 0,
            y: 0,
            width: 40,
            height: 40,
            color: '#ffaa00',
            interactDistance: 60
        };

        // Per-slot ammo/reload state
        const weaponSlotState = {
            main: { ammo: 0, maxAmmo: 0, isReloading: false, reloadTime: 0, maxReloadTime: 0, fireCooldown: 0 },
            sidearm: { ammo: 0, maxAmmo: 0, isReloading: false, reloadTime: 0, maxReloadTime: 0, fireCooldown: 0 }
        };

        function getActiveWeaponId() {
            return activeSlot === 'sidearm' ? sidearmId : selectedWeaponId;
        }

        function getActiveSlotState() {
            return weaponSlotState[activeSlot];
        }

        function getSelectedWeapon() {
            const id = getActiveWeaponId();
            const weapon = weaponConfigs[id] || weaponConfigs.handgun;
            const upgraded = { ...weapon };
            applyUpgradesToWeapon(upgraded);
            // Apply weapon mods
            const slotMods = equippedMods[activeSlot] || [];
            for (const modId of slotMods) {
                switch(modId) {
                    case 'expandedMag': upgraded.maxAmmo = Math.floor(upgraded.maxAmmo * 1.5); break;
                    case 'fastLoader': upgraded.reloadFrames = Math.floor(upgraded.reloadFrames * 0.7); break;
                    case 'hollowPoint': upgraded.damage *= 1.25; break;
                    case 'piercing': upgraded.piercing = true; break;
                    case 'silencer': upgraded.silent = true; break;
                    case 'incendiary': upgraded.appliesBurn = true; upgraded.burnDamage = (upgraded.burnDamage || 1); upgraded.burnDuration = (upgraded.burnDuration || 90); break;
                    case 'cryoRound': upgraded.appliesCryo = true; break;
                    case 'foregrip': upgraded.spread *= 0.6; break;
                    case 'drumMag': upgraded.maxAmmo = Math.floor(upgraded.maxAmmo * 2); upgraded.reloadFrames = Math.floor(upgraded.reloadFrames * 1.4); break;
                    case 'acidTip': upgraded.appliesAcid = true; break;
                }
            }
            // Frenzy skill: halve fire cooldown
            if (frenzyTimer > 0) upgraded.fireCooldownFrames = Math.max(0, Math.floor(upgraded.fireCooldownFrames / 2));
            return upgraded;
        }

        function getWeaponForSlot(slot) {
            const id = slot === 'sidearm' ? sidearmId : selectedWeaponId;
            const weapon = weaponConfigs[id] || weaponConfigs.handgun;
            const upgraded = { ...weapon };
            applyUpgradesToWeapon(upgraded);
            return upgraded;
        }

        function applySelectedWeapon(loadAmmo = false) {
            applyUpgradesToPlayer();
            // Initialize both slot states
            for (const slot of ['main', 'sidearm']) {
                const w = getWeaponForSlot(slot);
                const s = weaponSlotState[slot];
                s.maxAmmo = w.maxAmmo;
                s.maxReloadTime = w.reloadFrames;
                if (loadAmmo) {
                    s.ammo = w.maxAmmo;
                    s.isReloading = false;
                    s.reloadTime = 0;
                } else if (s.ammo > w.maxAmmo) {
                    s.ammo = w.maxAmmo;
                }
            }
            // Sync player convenience fields to active slot
            const s = getActiveSlotState();
            player.ammo = s.ammo;
            player.maxAmmo = s.maxAmmo;
            player.isReloading = s.isReloading;
            player.reloadTime = s.reloadTime;
            player.maxReloadTime = s.maxReloadTime;
        }

        function swapWeaponSlot() {
            if (weaponSwapCooldown > 0) return;
            const swapDelay = learnedSkills.passive.includes('quickHands') ? 9 : 15;
            weaponSwapCooldown = swapDelay;
            // Save current slot state
            const cur = getActiveSlotState();
            cur.ammo = player.ammo;
            cur.isReloading = player.isReloading;
            cur.reloadTime = player.reloadTime;
            cur.maxReloadTime = player.maxReloadTime;
            cur.fireCooldown = player.fireCooldown;

            activeSlot = activeSlot === 'main' ? 'sidearm' : 'main';

            // Load new slot state
            const nxt = getActiveSlotState();
            const w = getSelectedWeapon();
            nxt.maxAmmo = w.maxAmmo;
            nxt.maxReloadTime = w.reloadFrames;
            player.ammo = nxt.ammo;
            player.maxAmmo = nxt.maxAmmo;
            player.isReloading = nxt.isReloading;
            player.reloadTime = nxt.reloadTime;
            player.maxReloadTime = nxt.maxReloadTime;
            player.fireCooldown = nxt.fireCooldown || 0;
        }

        function getEnemyWeaponConfig(enemy) {
            return enemyWeaponConfigs[enemy.weaponId] || enemyWeaponConfigs.handgun;
        }

        function getEnemyAmmoProfile(weaponId) {
            if (!weaponId) {
                return { maxAmmo: 0, reloadFrames: 0 };
            }

            const fallbackMap = {
                sniper: 'rifle',
                minigun: 'ar',
                flameShotgun: 'shotgun'
            };

            const baseId = weaponConfigs[weaponId]
                ? weaponId
                : (fallbackMap[weaponId] || 'handgun');
            const baseWeapon = weaponConfigs[baseId] || weaponConfigs.handgun;
            return { maxAmmo: baseWeapon.maxAmmo, reloadFrames: baseWeapon.reloadFrames };
        }

        function chooseEnemyWeaponId() {
            const roll = Math.random();
            if (difficulty >= 12) {
                if (roll < 0.35) return 'ar';
                if (roll < 0.55) return 'rifle';
                if (roll < 0.75) return 'shotgun';
                return 'handgun';
            }
            if (difficulty >= 6) {
                if (roll < 0.3) return 'ar';
                if (roll < 0.42) return 'rifle';
                if (roll < 0.55) return 'shotgun';
                return 'handgun';
            }
            if (difficulty >= 3) {
                if (roll < 0.22) return 'ar';
                if (roll < 0.32) return 'rifle';
                if (roll < 0.42) return 'shotgun';
                return 'handgun';
            }
            return 'handgun';
        }

        function chooseEnemyVariant() {
            const roll = Math.random();
            if (difficulty >= 4 && roll < 0.05) {
                return 'special';
            }
            if (difficulty >= 3 && roll < 0.15) {
                return 'melee';
            }
            return 'ranged';
        }

        function chooseSpecialWeaponId() {
            const options = ['handgun', 'ar', 'rifle', 'shotgun'];
            return options[Math.floor(Math.random() * options.length)];
        }

        function chooseEliteVariant() {
            const roll = Math.random();
            if (roll < 0.36) {
                return 'eliteFlame';
            }
            if (roll < 0.72) {
                return 'eliteMinigun';
            }
            return 'eliteSniper';
        }

        function getEliteWeaponId(variant) {
            if (variant === 'eliteFlame') return 'flameShotgun';
            if (variant === 'eliteMinigun') return 'minigun';
            return 'sniper';
        }

        function tryPlayerShootAt(mapMouseX, mapMouseY) {
            if (gameState !== 'playing' || isPaused || player.isReloading || player.ammo <= 0 || player.fireCooldown > 0) {
                return false;
            }
            // Block shooting from main slot if no main weapon equipped
            if (activeSlot === 'main' && !selectedWeaponId) {
                return false;
            }

            const weapon = getSelectedWeapon();
            const dx = mapMouseX - (player.x + player.width / 2);
            const dy = mapMouseY - (player.y + player.height / 2);
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance <= 0) {
                return false;
            }

            const bulletColor = weapon.color || '#e8d44d';

            if (weapon.id === 'rifle' || weapon.id === 'crossbow') {
                performRifleHitscan(mapMouseX, mapMouseY, weapon);
            } else {
                const baseAngle = Math.atan2(dy, dx);
                for (let shot = 0; shot < weapon.shotsPerTrigger; shot++) {
                    const spreadOffset = (Math.random() - 0.5) * weapon.spread;
                    const angle = baseAngle + spreadOffset;
                    bullets.push({
                        x: player.x + player.width / 2,
                        y: player.y + player.height / 2,
                        velocityX: Math.cos(angle) * weapon.bulletSpeed,
                        velocityY: Math.sin(angle) * weapon.bulletSpeed,
                        size: weapon.bulletSize,
                        damage: weapon.damage,
                        color: bulletColor,
                        appliesBurn: !!weapon.appliesBurn,
                        burnDamage: weapon.burnDamage || 0,
                        burnDuration: weapon.burnDuration || 0,
                        appliesAcid: !!weapon.appliesAcid,
                        appliesCryo: !!weapon.appliesCryo,
                        isFlame: weapon.id === 'flamethrower',
                        piercing: !!weapon.piercing,
                        pierceCount: weapon.piercing ? 1 : 0,
                        trail: [],
                        trailMax: Math.max(bulletTrailMin, Math.min(bulletTrailMax, Math.round(weapon.bulletSpeed)))
                    });
                }
            }

            player.ammo--;
            player.fireCooldown = weapon.fireCooldownFrames || 0;
            // Sync to slot state
            getActiveSlotState().ammo = player.ammo;
            getActiveSlotState().fireCooldown = player.fireCooldown;

            // Muzzle flash
            if (weapon.id !== 'flamethrower') {
                muzzleFlashTimer = 4;
                muzzleFlashAngle = Math.atan2(dy, dx);
            }

            // Queue burst shots for burst rifle
            if (weapon.burstCount && weapon.burstCount > 1) {
                for (let b = 1; b < weapon.burstCount; b++) {
                    burstFireQueue.push({ targetX: mapMouseX, targetY: mapMouseY, timer: b * (weapon.burstDelay || 5) });
                }
            }

            if (!weapon.silent) {
                addNoise(0.35);
                playGunshot(0);
            }
            addScreenShake(weapon.id === 'flamethrower' ? 2 : 6, weapon.id === 'flamethrower' ? 4 : 12);

            if (player.ammo <= 0) {
                player.isReloading = true;
                player.reloadTime = player.maxReloadTime;
                getActiveSlotState().isReloading = true;
                getActiveSlotState().reloadTime = player.maxReloadTime;
            }

            return true;
        }

        function performRifleHitscan(mapMouseX, mapMouseY, weapon) {
            const originX = player.x + player.width / 2;
            const originY = player.y + player.height / 2;
            const dx = mapMouseX - originX;
            const dy = mapMouseY - originY;
            const distance = Math.hypot(dx, dy) || 1;
            const dirX = dx / distance;
            const dirY = dy / distance;
            const range = weapon.range || 2000;
            const endX = originX + dirX * range;
            const endY = originY + dirY * range;

            let closestIndex = -1;
            let closestDistance = range + 1;
            let hitX = endX;
            let hitY = endY;

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const enemyCenterX = enemy.x + enemy.width / 2;
                const enemyCenterY = enemy.y + enemy.height / 2;
                const enemyDistance = Math.hypot(enemyCenterX - originX, enemyCenterY - originY);

                if (enemyDistance > range) {
                    continue;
                }

                if (!hasLineOfSight(originX, originY, enemyCenterX, enemyCenterY)) {
                    continue;
                }

                if (!lineIntersectsRect(originX, originY, endX, endY, enemy.x, enemy.y, enemy.width, enemy.height)) {
                    continue;
                }

                if (enemyDistance < closestDistance) {
                    closestDistance = enemyDistance;
                    closestIndex = i;
                    hitX = enemyCenterX;
                    hitY = enemyCenterY;
                }
            }

            addHitscanEffect(originX, originY, hitX, hitY);

            if (closestIndex >= 0) {
                const enemy = enemies[closestIndex];
                applyDamageToEnemy(enemy, weapon.damage);
                enemy.hitTimer = 10;
                createHitEffect(hitX, hitY, '#ff6666');
                playHitSound(closestDistance);
                if (enemy.health <= 0) {
                    killEnemy(closestIndex, true);
                }
            }
        }

        // Input handling
        const keys = {};
        const mouseButtons = {
            left: false
        };
        const mousePosition = {
            x: canvas.width / 2,
            y: canvas.height / 2
        };

        window.addEventListener('keydown', (e) => {
            initAudio();
            if (audioContext && gameState === 'playing') startAmbientMusic(currentLevel);
            // Toggle map on M (only during gameplay)
            if (e.key.toLowerCase() === 'm' && gameState === 'playing') {
                mapOpen = !mapOpen;
                e.preventDefault();
                return;
            }
            // While map is open: only ESC closes it, all other keys blocked
            if (mapOpen) {
                if (e.key === 'Escape') mapOpen = false;
                return;
            }
            // Toggle pause on ESC (only during gameplay)
            if (e.key === 'Escape' && gameState === 'playing') {
                isPaused = !isPaused;
                return;
            }
            if (e.key === '`' && gameState === 'playing') {
                if (difficulty < maxDifficulty) {
                    difficulty++;
                    if (difficulty > maxDifficulty) {
                        difficulty = maxDifficulty;
                    }
                    difficultyProgress = 0;
                }
                return;
            }
            if (e.code === 'Space' && gameState === 'playing' && !isPaused) {
                performDash();
                e.preventDefault();
            }
            if (e.key.toLowerCase() === 'q' && gameState === 'playing' && !isPaused) {
                swapWeaponSlot();
            }
            if (e.key === '1' && gameState === 'playing' && !isPaused) {
                if (selectedWeaponId && activeSlot !== 'main') swapWeaponSlot();
            }
            if (e.key === '2' && gameState === 'playing' && !isPaused) {
                if (activeSlot !== 'sidearm') swapWeaponSlot();
            }
            if (e.key.toLowerCase() === 'g' && gameState === 'playing' && !isPaused) {
                throwGrenade();
            }
            // Active skill keys
            if (gameState === 'playing' && !isPaused) {
                for (const [id, def] of Object.entries(activeSkillDefs)) {
                    if (e.key.toLowerCase() === def.key && learnedSkills.active.includes(id)) {
                        if (!activeSkillCooldowns[id] || activeSkillCooldowns[id] <= 0) {
                            activateSkill(id, def);
                        }
                    }
                }
            }
            keys[e.key.toLowerCase()] = true;
        });

        window.addEventListener('wheel', (e) => {
            if (gameState === 'playing' && !isPaused) {
                swapWeaponSlot();
            }
        }, { passive: true });

        window.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Mouse click to shoot
        window.addEventListener('mousedown', (e) => {
            initAudio();
            if (audioContext && gameState === 'playing') startAmbientMusic(currentLevel);
            const rect = canvas.getBoundingClientRect();
            mousePosition.x = e.clientX - rect.left;
            mousePosition.y = e.clientY - rect.top;

            // Handle continue button on death screen
            const explosionDuration = 200;
            if (gameState === 'death' && deathTimer > explosionDuration + 240 && deathMoneyCount >= runMoneyEarned && deathKillsCount >= runEnemiesKilled) {
                const buttonWidth = 200;
                const buttonHeight = 50;
                const buttonX = canvas.width / 2 - buttonWidth / 2;
                const buttonY = canvas.height / 2 + 200;

                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                if (mouseX >= buttonX && mouseX <= buttonX + buttonWidth &&
                    mouseY >= buttonY && mouseY <= buttonY + buttonHeight) {
                    window.location.href = `base.html?${buildBaseStateQuery()}`;
                    return;
                }
            }

            // Mute toggle button while paused
            if (gameState === 'playing' && isPaused && e.button === 0) {
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;
                const pw = 460, ph = 380;
                const py = cy - ph / 2;
                const muteY = py + ph - 54;
                const muteW = 160, muteH = 34;
                const muteX = cx - muteW / 2;
                const mx = e.clientX - rect.left;
                const my = e.clientY - rect.top;
                if (mx >= muteX && mx <= muteX + muteW && my >= muteY && my <= muteY + muteH) {
                    setMusicMute(!musicMuted);
                    return;
                }
            }

            if (gameState === 'playing' && !isPaused) {
                if (e.button === 2) {
                    performMeleeAttack();
                    return;
                }

                if (e.button !== 0) {
                    return;
                }

                mouseButtons.left = true;
            }
            
            if (gameState !== 'playing' || e.button !== 0) {
                return;
            }

            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            tryPlayerShootAt(mouseX + camera.x, mouseY + camera.y);
        });

        window.addEventListener('mouseup', (e) => {
            if (e.button === 0) {
                mouseButtons.left = false;
            }
        });

        // Prevent browser context menu on right-click
        window.addEventListener('contextmenu', (e) => {
            e.preventDefault();
        });

        // Mouse move for button hover
        window.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            mousePosition.x = e.clientX - rect.left;
            mousePosition.y = e.clientY - rect.top;

            const explosionDuration = 200;
            if (gameState === 'death' && deathTimer > explosionDuration + 240) {
                const buttonWidth = 200;
                const buttonHeight = 50;
                const buttonX = canvas.width / 2 - buttonWidth / 2;
                const buttonY = canvas.height / 2 + 200;

                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                continueButtonHover = mouseX >= buttonX && mouseX <= buttonX + buttonWidth &&
                                     mouseY >= buttonY && mouseY <= buttonY + buttonHeight;
            } else {
                continueButtonHover = false;
            }
        });

        function performDash() {
            if (player.dashCooldown > 0 || player.dashTimer > 0) {
                return;
            }

            let dirX = 0;
            let dirY = 0;

            if (keys['w']) dirY -= 1;
            if (keys['s']) dirY += 1;
            if (keys['a']) dirX -= 1;
            if (keys['d']) dirX += 1;

            if (dirX === 0 && dirY === 0) {
                const playerCenterX = player.x + player.width / 2;
                const playerCenterY = player.y + player.height / 2;
                dirX = (mousePosition.x + camera.x) - playerCenterX;
                dirY = (mousePosition.y + camera.y) - playerCenterY;
            }

            const length = Math.hypot(dirX, dirY);
            if (length === 0) {
                return;
            }

            const normalizedX = dirX / length;
            const normalizedY = dirY / length;
            player.dashVelocityX = normalizedX * (player.dashDistance / player.dashFrames);
            player.dashVelocityY = normalizedY * (player.dashDistance / player.dashFrames);
            player.dashTimer = player.dashFrames;
            player.dashCooldown = player.maxDashCooldown;
            addNoise(learnedSkills.passive.includes('lightFoot') ? 0.025 : 0.08);
        }

        function performMeleeAttack() {
            if (player.meleeCooldown > 0) {
                return;
            }

            player.meleeCooldown = player.maxMeleeCooldown;
            player.meleeEffectTimer = 8;

            const playerCenterX = player.x + player.width / 2;
            const playerCenterY = player.y + player.height / 2;
            let dirX = (mousePosition.x + camera.x) - playerCenterX;
            let dirY = (mousePosition.y + camera.y) - playerCenterY;
            const dirLength = Math.hypot(dirX, dirY) || 1;
            dirX /= dirLength;
            dirY /= dirLength;
            player.meleeDirX = dirX;
            player.meleeDirY = dirY;

            addNoise(learnedSkills.passive.includes('lightFoot') ? 0.035 : 0.1);

            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const enemyCenterX = enemy.x + enemy.width / 2;
                const enemyCenterY = enemy.y + enemy.height / 2;
                const toEnemyX = enemyCenterX - playerCenterX;
                const toEnemyY = enemyCenterY - playerCenterY;
                const distance = Math.hypot(toEnemyX, toEnemyY);

                if (distance > player.meleeRange) {
                    continue;
                }

                const normalizedToEnemyX = toEnemyX / (distance || 1);
                const normalizedToEnemyY = toEnemyY / (distance || 1);
                const dot = normalizedToEnemyX * dirX + normalizedToEnemyY * dirY;

                if (dot < 0.2) {
                    continue;
                }

                applyDamageToEnemy(enemy, player.meleeDamage);
                enemy.hitTimer = 10;
                createHitEffect(enemyCenterX, enemyCenterY, '#ffeeaa');
                playHitSound(distance);

                if (enemy.health <= 0) {
                    killEnemy(i, true);
                }
            }
        }
        // Update player position
        function updatePlayer() {
            player.velocityX = 0;
            player.velocityY = 0;

            if (player.dashCooldown > 0) {

            }

            if (player.meleeCooldown > 0) {
                player.meleeCooldown--;
            }

            if (player.meleeEffectTimer > 0) {
                player.meleeEffectTimer--;
            }

            if (player.fireCooldown > 0) {
                player.fireCooldown--;
            }

                player.burnTimer--;
                if (player.burnVisualTimer > 0) {
                    player.burnVisualTimer--;
                }
                if (player.burnTickTimer > 0) {
                    player.burnTickTimer--;
                }
                if (player.burnTickTimer <= 0) {
                    player.burnTickTimer = 18;
                    const burnDamage = Math.max(1, Math.round(player.burnTickDamage || 0));
                    player.health -= burnDamage;
                    player.health = Math.max(0, Math.floor(player.health));
                    player.hitTimer = 6;
                    createHitEffect(player.x + player.width / 2, player.y + player.height / 2, '#ff9933');
                    if (player.health <= 0) {

                player.burnTickDamage = 0;
                player.burnTickTimer = 0;

            if (mouseButtons.left) {
                const aw = getSelectedWeapon();
                if (aw.fireCooldownFrames > 0 && aw.id !== 'rifle' && aw.id !== 'crossbow' && aw.id !== 'handgun' && aw.id !== 'sawedOffShotgun' && aw.id !== 'burstRifle') {
                    tryPlayerShootAt(mousePosition.x + camera.x, mousePosition.y + camera.y);

            }

            // Process burst fire queue
            for (let i = burstFireQueue.length - 1; i >= 0; i--) {
                burstFireQueue[i].timer--;
                if (burstFireQueue[i].timer <= 0) {
                    const b = burstFireQueue.splice(i, 1)[0];
                    if (!player.isReloading && player.ammo > 0 && gameState === 'playing' && !isPaused) {
                        const weapon = getSelectedWeapon();
                        const dx = b.targetX - (player.x + player.width / 2);
                        const dy = b.targetY - (player.y + player.height / 2);
                        const baseAngle = Math.atan2(dy, dx);
                        const spreadOffset = (Math.random() - 0.5) * weapon.spread;
                        const angle = baseAngle + spreadOffset;
                        bullets.push({
                            x: player.x + player.width / 2, y: player.y + player.height / 2,
                            velocityX: Math.cos(angle) * weapon.bulletSpeed, velocityY: Math.sin(angle) * weapon.bulletSpeed,
                            size: weapon.bulletSize, damage: weapon.damage, color: weapon.color || '#e8d44d',
                            appliesBurn: !!weapon.appliesBurn, burnDamage: weapon.burnDamage || 0, burnDuration: weapon.burnDuration || 0,
                            appliesAcid: false, appliesCryo: false, isFlame: false, piercing: false, pierceCount: 0,
                            trail: [], trailMax: Math.max(bulletTrailMin, Math.min(bulletTrailMax, Math.round(weapon.bulletSpeed)))
                        });
                        player.ammo--;
                        getActiveSlotState().ammo = player.ammo;
                        if (player.ammo <= 0) {
                            player.isReloading = true;
                            player.reloadTime = player.maxReloadTime;
                            getActiveSlotState().isReloading = true;
                            getActiveSlotState().reloadTime = player.maxReloadTime;
                        }
                    }
                }
            }

            let inputX = 0;
            let inputY = 0;

            if (keys['w']) {
                inputY -= 1;
            }
            if (keys['s']) {
                inputY += 1;
            }
            if (keys['a']) {
                inputX -= 1;
            }
            if (keys['d']) {
                inputX += 1;
            }

            if (inputX !== 0 || inputY !== 0) {
                const length = Math.hypot(inputX, inputY);
                player.velocityX = (inputX / length) * player.speed;
                player.velocityY = (inputY / length) * player.speed;
                const moveNoise = learnedSkills.passive.includes('lightFoot') ? 0.006 : 0.015;
                addNoise(moveNoise);
                // Footstep sounds
                if (footstepTimer <= 0) {
                    playFootstep();
                    footstepTimer = learnedSkills.passive.includes('lightFoot') ? 28 : 22;
                }
            }
            if (footstepTimer > 0) footstepTimer--;

            // Manual reload with R key
            if (keys['r'] && !player.isReloading && player.ammo < player.maxAmmo) {
                player.isReloading = true;
                player.reloadTime = player.maxReloadTime;
                getActiveSlotState().isReloading = true;
                getActiveSlotState().reloadTime = player.maxReloadTime;
            }

            // Helper function to check collision
            function checkCollision(x, y) {
                return checkObstacleCollision(x, y, player.width, player.height);
            }

            if (player.dashTimer > 0) {
                let dashNewX = player.x + player.dashVelocityX;
                if (!checkCollision(dashNewX, player.y)) {
                    player.x = dashNewX;
                }

                let dashNewY = player.y + player.dashVelocityY;
                if (!checkCollision(player.x, dashNewY)) {
                    player.y = dashNewY;

                player.dashTimer--;
            } else {
                // Try to move horizontally
                let newX = player.x + player.velocityX;
                if (!checkCollision(newX, player.y)) {
                    player.x = newX;
                }

                // Try to move vertically
                let newY = player.y + player.velocityY;
                if (!checkCollision(player.x, newY)) {
                    player.y = newY;
                }
            }

            // Keep player in bounds of map
            if (player.x < 0) player.x = 0;
            if (player.x + player.width > mapWidth) player.x = mapWidth - player.width;
            if (player.y < 0) player.y = 0;
            if (player.y + player.height > mapHeight) player.y = mapHeight - player.height;

            // Update reload
            if (player.isReloading) {
                player.reloadTime--;
                if (player.reloadTime <= 0) {
                    player.isReloading = false;
                    player.ammo = player.maxAmmo;
                    const s = getActiveSlotState();
                    s.isReloading = false;
                    s.ammo = player.maxAmmo;
                    s.reloadTime = 0;

            if (player.hitTimer > 0) {
                player.hitTimer--;
            }

            // Update skill timers
            for (const id in activeSkillCooldowns) {
                if (activeSkillCooldowns[id] > 0) activeSkillCooldowns[id]--;
            }
            if (adrenalineTimer > 0) adrenalineTimer--;
            if (smokeCloakTimer > 0) smokeCloakTimer--;
            if (frenzyTimer > 0) frenzyTimer--;
            if (playerBlindTimer > 0) playerBlindTimer--;
            if (weaponSwapCooldown > 0) weaponSwapCooldown--;

            // Poison damage
            if (player.poisonTimer > 0) {
                player.poisonTimer--;
                if (player.poisonTimer % 20 === 0) {
                    player.health -= player.poisonDamage || 0.5;
                    player.health = Math.max(0, player.health);
                    createHitEffect(player.x + player.width / 2, player.y + player.height / 2, '#55ff55');
                    if (player.health <= 0) {
                        triggerPlayerDeath();
                        return;
                    }

            // Environmental hazard effects
            {
                const pcx = player.x + player.width / 2;
                const pcy = player.y + player.height / 2;
                for (const h of envHazards) {
                    const inHazard = pcx > h.x && pcx < h.x + h.width && pcy > h.y && pcy < h.y + h.height;
                    if (!inHazard) continue;
                    if (h.type === 'puddle') {
                        player.velocityX *= 0.65; player.velocityY *= 0.65;
                    } else if (h.type === 'rug') {
                        player.velocityX *= 0.78; player.velocityY *= 0.78;
                    } else if (h.type === 'tape') {
                        player.velocityX *= 0.4; player.velocityY *= 0.4;
                    } else if (h.type === 'mud') {
                        player.velocityX *= 0.55; player.velocityY *= 0.55;
                    } else if (h.type === 'wire') {
                        // Wire — deals small damage every 30 frames
                        if (!h._dmgTimer) h._dmgTimer = 0;
                        h._dmgTimer++;
                        if (h._dmgTimer >= 30) {
                            h._dmgTimer = 0;
                            applyPlayerDamage(3);
                            createHitEffect(pcx, pcy, '#ffcc00');

                        player.velocityX *= 0.6; player.velocityY *= 0.6;

                        h._dmgTimer++;
                        if (h._dmgTimer >= 60) {

            // Update camera to follow player (keep player centered on screen)
            camera.x = player.x - canvas.width / 2 + player.width / 2;
            camera.y = player.y - canvas.height / 2 + player.height / 2;

            // Clamp camera to map bounds
            if (camera.x < 0) camera.x = 0;
            if (camera.x + canvas.width > mapWidth) camera.x = mapWidth - canvas.width;
            if (camera.y < 0) camera.y = 0;
